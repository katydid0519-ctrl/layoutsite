<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사무실 레이아웃 편집기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;display:flex;flex-direction:column;height:100vh;overflow:hidden;user-select:none}
#toolbar{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:#fff;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.08);z-index:100;flex-shrink:0}
.toolbar-brand{display:flex;align-items:center;min-height:38px;flex-shrink:0}
.toolbar-groups{display:flex;align-items:flex-start;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.toolbar-group{display:flex;align-items:center;gap:4px;padding:4px;background:#f8fbff;border:1px solid #dbe4ef;border-radius:8px;box-shadow:inset 0 1px 0 rgba(255,255,255,.75)}
.toolbar-group.primary{background:#eff6ff;border-color:#bfdbfe}
.toolbar-group.utility{margin-left:auto}
.tbar-title{font-weight:700;font-size:14px;color:#1e293b}
.tbtn{padding:5px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;white-space:nowrap;transition:background .1s,color .1s;min-height:30px}
.tbtn:hover{background:#f0f4f8}
.tbtn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.tbtn:disabled{opacity:.4;cursor:not-allowed}
.tsep{display:none}
#main{display:flex;flex:1;overflow:hidden;min-height:0}
#left-panel{width:190px;background:#fff;border-right:1px solid #e2e8f0;overflow-y:auto;flex-shrink:0}
.psec{padding:6px 0 0}
.psec-title{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;padding:4px 10px 4px;cursor:pointer;border-top:1px solid #f1f5f9;user-select:none}
.psec-title:hover{background:#f8fafc}
.psec-arrow{font-size:8px;color:#94a3b8;transition:transform .15s;flex-shrink:0}
.psec-arrow.collapsed{transform:rotate(-90deg)}
.psec-items{padding:0 10px 6px}
.psec-items.collapsed{display:none}
.pal-item.wall-tool{background:#f8fafc;border:1px dashed #cbd5e1;cursor:pointer}
.pal-item.wall-tool:hover{background:#eff6ff;border-color:#3b82f6}
.pal-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;cursor:grab;transition:background .1s;margin-bottom:2px}
.pal-item:hover{background:#eff6ff}
.pal-name{font-size:11px;color:#374151;line-height:1.2}
#canvas-container{flex:1;overflow:hidden;position:relative;background:#e2e8f0;cursor:default}
#main-canvas{display:block;position:absolute;top:0;left:0}
#right-panel{width:240px;background:#fff;border-left:1px solid #e2e8f0;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.rprop{padding:10px 12px;border-bottom:1px solid #f1f5f9}
.rprop-title{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.prow{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.plabel{font-size:11px;color:#64748b;width:48px;flex-shrink:0}
.pinput{flex:1;padding:4px 6px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px;color:#1e293b;min-width:0}
.pinput:focus{outline:none;border-color:#3b82f6}
.small-btn{padding:4px 8px;border:1px solid #e2e8f0;border-radius:4px;background:#fff;cursor:pointer;font-size:11px}
.small-btn:hover{background:#f0f4f8}
#layer-panel{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.layer-panel-header{padding:8px 12px 6px;border-bottom:1px solid #f1f5f9;flex-shrink:0}
.layer-panel-title{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.layer-panel-btns{display:flex;gap:4px;flex-wrap:wrap}
.layer-panel-btns .small-btn{font-size:10px;padding:3px 6px}
#layer-list{flex:1;overflow-y:auto;padding:4px 6px}
.layer-item{display:flex;align-items:center;gap:4px;padding:4px 5px;border-radius:4px;cursor:pointer;font-size:11px;color:#374151;position:relative}
.layer-item:hover{background:#f8fafc}
.layer-item.sel{background:#eff6ff;color:#2563eb;font-weight:600}
.layer-item.hidden-obj{opacity:.45}
.layer-item.locked-obj{cursor:not-allowed}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid #cbd5e1}
.lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.lbtn{width:18px;height:18px;border:1px solid transparent;background:transparent;border-radius:3px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.55;padding:0}
.lbtn:hover{background:#f0f4f8;opacity:1;border-color:#e2e8f0}
.lbtn.active-state{opacity:1}
.layer-group{margin-bottom:2px}
.layer-group-hdr{display:flex;align-items:center;gap:4px;padding:4px 5px;border-radius:4px;cursor:pointer;font-size:11px;color:#374151;font-weight:600;background:#f8fafc}
.layer-group-hdr:hover{background:#f0f4f8}
.layer-group-hdr.sel-group{background:#dbeafe;color:#1d4ed8}
.layer-group-arrow{font-size:9px;flex-shrink:0;transition:transform .15s}
.layer-group-arrow.collapsed{transform:rotate(-90deg)}
.layer-group-children{padding-left:14px;display:flex;flex-direction:column;gap:1px}
.layer-sep{height:1px;background:#f1f5f9;margin:3px 0}
#zoom-badge{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.5);color:#fff;font-size:11px;padding:2px 8px;border-radius:4px;pointer-events:none}
#save-toast{position:absolute;bottom:10px;right:10px;background:rgba(30,200,100,.85);color:#fff;font-size:11px;padding:3px 10px;border-radius:4px;pointer-events:none;opacity:0;transition:opacity .3s}
#ghost{position:fixed;pointer-events:none;z-index:9999;display:none;opacity:.75}
#text-editor{display:none;position:absolute;z-index:300}
#text-editor textarea{border:2px solid #3b82f6;border-radius:4px;padding:4px 6px;font-family:inherit;resize:none;background:rgba(255,255,255,.95);outline:none;text-align:center}
#wall-hud{display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:5px 12px;align-items:center;gap:6px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,.12);z-index:200;white-space:nowrap}
#wall-hud.visible{display:flex}
#wall-hud label{color:#64748b;font-size:11px}
#wall-hud input{width:52px;padding:2px 5px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px;color:#1e293b}
#wall-hud input:focus{outline:none;border-color:#3b82f6}
#wall-hud .hud-sep{width:1px;height:16px;background:#e2e8f0}
#wall-hud .hud-apply{padding:2px 8px;border:1px solid #3b82f6;border-radius:4px;background:#3b82f6;color:#fff;cursor:pointer;font-size:11px}
#three-overlay{display:none;position:absolute;inset:0;z-index:260;background:#eef2f7;overflow:hidden}
#three-overlay.visible{display:block}
#three-canvas-host{position:absolute;inset:0}
#three-canvas-host canvas{display:block;width:100%;height:100%}
#three-viewbar{position:absolute;top:10px;right:10px;display:flex;gap:6px;z-index:2;background:rgba(255,255,255,.9);border:1px solid #e2e8f0;border-radius:8px;padding:6px;box-shadow:0 2px 10px rgba(15,23,42,.12)}
#three-status{position:absolute;left:12px;bottom:12px;z-index:2;background:rgba(15,23,42,.78);color:#fff;border-radius:5px;padding:5px 9px;font-size:11px;max-width:360px}
#three-status:empty{display:none}
@media print{#toolbar,#left-panel,#right-panel{display:none!important}#canvas-container{position:fixed;top:0;left:0;width:100vw;height:100vh}}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script type="module">import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js'; window.OrbitControls = OrbitControls;</script>
</head>
<body>
<div id="toolbar">
  <span class="tbar-title">🏢 레이아웃 편집기</span>
  <div class="tsep"></div>
  <button class="tbtn active" id="btn-select" onclick="setMode('select')">▶ 선택</button>
  <button class="tbtn" id="btn-wall" onclick="setMode('wall')">━ 벽 그리기</button>
  <button class="tbtn" id="btn-measure" onclick="setMode('measure')">📏 측정</button>
  <button class="tbtn" id="btn-dim" onclick="setMode('dim')">📐 치수</button>
  <button class="tbtn" id="btn-simple-view" onclick="toggleSimpleView()" title="윤곽선과 치수만 표시">▢ 간소 보기</button>
  <button class="tbtn" id="btn-simple-numbers" onclick="toggleSimpleNumbers()" title="간소 보기의 수치 표시/숨김">123 수치 숨김</button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="deleteSelected()">🗑 삭제</button>
  <button class="tbtn" onclick="rotateSelected()">↻ 회전</button>
  <button class="tbtn" onclick="flipSelected()" title="좌우 반전 (F)">↔ 반전</button>
  <div class="tsep"></div>
   <button class="tbtn" onclick="groupSelected()" title="그룹 묶기 (Ctrl+G)">🔗 그룹</button>
  <button class="tbtn" onclick="ungroupSelected()" title="그룹 해제 (Ctrl+Shift+G)">🔓 그룹해제</button>
  <button class="tbtn" onclick="alignSelected('left')" title="왼쪽 정렬">⫷ 좌</button>
  <button class="tbtn" onclick="alignSelected('center-h')" title="수평 가운데 정렬">⫿ 중</button>
  <button class="tbtn" onclick="alignSelected('right')" title="오른쪽 정렬">⫸ 우</button>
  <button class="tbtn" onclick="alignSelected('top')" title="위쪽 정렬">⫠ 상</button>
  <button class="tbtn" onclick="alignSelected('center-v')" title="수직 가운데 정렬">⫟ 중</button>
  <button class="tbtn" onclick="alignSelected('bottom')" title="아래쪽 정렬">⫡ 하</button>
  <button class="tbtn" onclick="distributeSelected('h')" title="수평 균등 분배">⟺ 수평</button>
  <button class="tbtn" onclick="distributeSelected('v')" title="수직 균등 분배">⟺ 수직</button>
  <button class="tbtn" onclick="saveAsCustomObj()" title="선택/그룹을 사용자 오브젝트로 저장">💎 저장</button>
  <button class="tbtn" onclick="manageCustomObjs()" title="사용자 오브젝트 관리">📦 관리</button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="copySelected()" title="복사 (Ctrl+C)">📋 복사</button>

  <button class="tbtn" onclick="pasteClipboard()" title="붙여넣기 (Ctrl+V)">📌 붙여넣기</button>
  <div class="tsep"></div>
  <button class="tbtn" id="btn-undo" onclick="undo()" disabled>↩ 되돌리기</button>
  <button class="tbtn" id="btn-redo" onclick="redo()" disabled>↪ 다시실행</button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="saveLayout()">💾 저장</button>
  <button class="tbtn" onclick="loadLayout()">📂 불러오기</button>
  <button class="tbtn" onclick="exportPNG()">🖼 PNG</button>
  <button class="tbtn" onclick="window.print()">🖨 인쇄</button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="showShortcuts()">⌨ 단축키</button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="doZoom(0.15)">🔍+</button>
  <button class="tbtn" onclick="doZoom(-0.15)">🔍−</button>
  <button class="tbtn" onclick="resetView()">1:1</button>
  <button class="tbtn" id="btn-3d-view" onclick="toggle3DView()">3D 보기</button>
</div>
<div id="main">
  <div id="left-panel">
    <div id="palette"></div>
  </div>
  <div id="canvas-container">
    <canvas id="main-canvas"></canvas>
    <div id="zoom-badge">100%</div>
    <div id="save-toast">저장됨</div>
    <div id="text-editor"><textarea id="text-ta" rows="2"></textarea></div>
    <div id="wall-hud">
      <label>두께</label>
      <input type="number" id="wc-thick" value="8" min="1" max="200" oninput="S.wallT=+this.value;if(tempWall)tempWall.t=S.wallT;render()">
      <label>px</label>
      <div class="hud-sep"></div>
      <label>길이</label>
      <input type="number" id="wc-len" placeholder="cm" onkeydown="if(event.key==='Enter')applyWallLen()">
      <label>cm</label>
      <button class="hud-apply" onclick="applyWallLen()">적용</button>
    </div>
    <div id="three-overlay" aria-label="3D 보기">
      <div id="three-canvas-host"></div>
      <div id="three-viewbar">
        <button class="small-btn" onclick="reset3DCamera()">시점 초기화</button>
        <button class="small-btn" onclick="set3DTopView()">위에서 보기</button>
        <button class="small-btn" onclick="set3DFrontView()">정면 보기</button>
        <button class="small-btn" onclick="set3DMode(false)">2D 보기</button>
      </div>
      <div id="three-status"></div>
    </div>
  </div>
  <div id="right-panel">
    <div class="rprop">
      <div class="rprop-title">공간 설정</div>
      <div class="prow"><span class="plabel">가로(m)</span><input class="pinput" type="number" id="off-w" value="20" min="2" max="200" onchange="applyOfficeSize()"></div>
      <div class="prow"><span class="plabel">세로(m)</span><input class="pinput" type="number" id="off-h" value="15" min="2" max="200" onchange="applyOfficeSize()"></div>
      <div class="prow"><span class="plabel">격자 스냅</span><label style="font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px"><input type="checkbox" id="snap-chk" checked onchange="S.snap=$('#snap-chk').checked"> ON</label></div>
            <div class="prow"><span class="plabel">벽 두께</span><input class="pinput" type="number" id="wall-t" value="8" min="2" max="50" onchange="S.wallT=+this.value"></div>
      <div class="prow"><span class="plabel">px→cm</span><input class="pinput" type="number" id="px2cm" value="1" min="0.1" max="10" step="0.1" onchange="applyPx2cm()"><span style="font-size:10px;color:#94a3b8">배율</span></div>
    </div>
    <div class="rprop" id="obj-props" style="display:none">

      <div class="rprop-title">오브젝트 속성</div>
      <div class="prow"><span class="plabel">이름</span><input class="pinput" id="p-name" oninput="applyPropName()"></div>
      <div class="prow"><span class="plabel">색상</span><input class="pinput" type="color" id="p-color" style="height:26px;padding:2px" oninput="applyPropColor()"></div>
      <div class="prow">
       
        <span class="plabel">X</span><input class="pinput" type="number" id="p-x" onchange="applyPropGeom()">
        <span class="plabel" style="width:20px;text-align:center">Y</span><input class="pinput" type="number" id="p-y" onchange="applyPropGeom()">
      </div>
      <div class="prow" id="p-wh">
        <span class="plabel">W</span><input class="pinput" type="number" id="p-w" onchange="applyPropGeom()">
        <span class="plabel" style="width:20px;text-align:center">H</span><input class="pinput" type="number" id="p-h" onchange="applyPropGeom()">
      </div>
            <div class="prow" id="p-rot-row">
        <span class="plabel">각도°</span><input class="pinput" type="number" id="p-rot" onchange="applyPropGeom()">

        <button class="small-btn" onclick="rotateSelected()">90°↻</button>
        <button class="small-btn" onclick="flipSelected()">↔</button>
      </div>
      <div class="prow" id="p-h3d-row" style="display:none">
        <span class="plabel">3D높이</span><input class="pinput" type="number" id="p-h3d" step="0.1" min="0.1" max="10" oninput="applyPropH3d()"><span style="font-size:10px;color:#94a3b8">m</span>
      </div>
      <div class="prow" id="p-textrow" style="display:none">
        <span class="plabel">텍스트</span>
        <textarea class="pinput" id="p-text" rows="2" oninput="applyPropText()" style="resize:vertical;min-height:36px;font-size:11px;line-height:1.4"></textarea>
      </div>
      <div class="prow" id="p-fsrow" style="display:none">
        <span class="plabel">글자크기</span>
        <input class="pinput" type="number" id="p-fontsize" value="18" min="6" max="200" oninput="applyPropFontSize()">
        <span style="font-size:10px;color:#94a3b8">px</span>
      </div>
    </div>
    <div class="rprop" id="three-settings">
      <div class="rprop-title">3D 설정</div>
      <div class="prow"><span class="plabel">벽 높이</span><input class="pinput" type="number" id="three-wall-height" value="2.4" min="0.5" max="10" step="0.1"><span style="font-size:10px;color:#94a3b8">m</span></div>
      <div class="prow"><span class="plabel">창대석</span><input class="pinput" type="number" id="three-sill-height" value="0.82" min="0.1" max="2" step="0.01"><span style="font-size:10px;color:#94a3b8">m</span></div>
      <div class="prow"><span class="plabel">바닥</span><select class="pinput" id="three-floor-mat"><option value="wood">나무</option><option value="concrete">콘크리트</option><option value="tile">타일</option></select></div>
      <div class="prow"><span class="plabel">벽</span><select class="pinput" id="three-wall-mat"><option value="white">흰색</option><option value="gray">회색</option><option value="brick">벽돌</option></select></div>
      <div class="prow"><span class="plabel"></span><button class="small-btn" style="flex:1" onclick="rebuild3DView()">3D 재생성</button></div>
    </div>
    <div id="layer-panel">
      <div class="layer-panel-header">
        <div class="layer-panel-title">레이어</div>
        <div class="layer-panel-btns">
          <button class="small-btn" onclick="layerMove(1)">▲ 위로</button>
          <button class="small-btn" onclick="layerMove(-1)">▼ 아래로</button>
        </div>
      </div>
      <div id="layer-list"></div>
    </div>
  </div>
</div>
<canvas id="ghost"></canvas>
<script>
const $ = id => document.getElementById(id);
const GRID = 20, PPM = 40;
const LS_KEY = 'office-layout-v2';

const S = {
  objects: [],
  groups: [],
  clipboard: null,
  sel: new Set(),
  mode: 'select',
  simpleView: false,
  simpleNumbers: true,
  zoom: 1, panX: 40, panY: 40,
  snap: true, wallT: 8,
  offW: 20, offH: 15,
  nextId: 1,
  nextGid: 1,
  px2cm: 1,
  customObjs: [],
  undoStack: [], redoStack: [],
};



const cont  = $('canvas-container');
const cv    = $('main-canvas');
const ctx   = cv.getContext('2d');

function resizeCv() { cv.width=cont.clientWidth; cv.height=cont.clientHeight; render(); }
new ResizeObserver(resizeCv).observe(cont);

// ─── furniture definitions ───────────────────────────────────────────────────
const FCATS = [
  { title:'업무 가구', defs:[
    {sub:'desk1',         name:'책상 (1인용)',      w:80,  h:60,  col:'#f0ece0'},
    {sub:'desk2',         name:'책상 (2인 마주)',    w:80,  h:120, col:'#f0ece0'},
    {sub:'deskL',         name:'책상 (ㄱ자형)',      w:150, h:100, col:'#f0ece0'},
    {sub:'deskS',         name:'책상 (사이드)',      w:100, h:50,  col:'#f0ece0'},
    {sub:'deskCluster4',  name:'4인 클러스터',       w:160, h:120, col:'#f0ece0'},
    {sub:'chair',         name:'의자',              w:40,  h:40,  col:'#c8c8c8'},
    {sub:'partition',     name:'파티션',            w:150, h:6,   col:'#c8cdd4'},
  ]},
  { title:'구조 / 시설', defs:[
    {sub:'__wall__',      name:'벽 그리기',         w:60,  h:14,  col:'#334155'},
    {sub:'door',          name:'출입문',            w:80,  h:20,  col:'#dbeafe'},
    {sub:'doubleDoor',    name:'양문형 출입문',      w:110, h:24,  col:'#dbeafe'},
    {sub:'window',        name:'창문',              w:80,  h:16,  col:'#bae6fd'},
    {sub:'windowsill',    name:'창대석',            w:100, h:24,  col:'#e5e7eb'},
    {sub:'stairs',        name:'계단',              w:100, h:80,  col:'#f1f5f9'},
    {sub:'elevator',      name:'엘리베이터',         w:80,  h:80,  col:'#e8eef4'},
    {sub:'column',        name:'기둥',              w:30,  h:30,  col:'#94a3b8'},
  ]},

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#cbd5e1'; ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.translate(S.panX, S.panY);
  ctx.scale(S.zoom, S.zoom);

  const ow = S.offW * PPM, oh = S.offH * PPM;
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, ow, oh);

  if (!S.simpleView) {
    ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5;
    for (let x=0;x<=ow;x+=GRID){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,oh);ctx.stroke();}
    for (let y=0;y<=oh;y+=GRID){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(ow,y);ctx.stroke();}
    ctx.strokeStyle = '#c7d2dc'; ctx.lineWidth = 0.8;
    for (let x=0;x<=ow;x+=PPM){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,oh);ctx.stroke();}
    for (let y=0;y<=oh;y+=PPM){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(ow,y);ctx.stroke();}
  }
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, ow, oh);
  if (S.simpleView && S.simpleNumbers) drawSimpleOfficeSize(ow, oh);

  const sorted = [...S.objects].sort((a,b)=>(a.zi||0)-(b.zi||0));
  for (const o of sorted) {
    if (o.visible === false) continue;
    drawObj(o, S.sel.has(o.id), hover===o.id && !S.sel.has(o.id));
  }

  if (tempDim) drawDimension(tempDim, false, false, 0.6);
  if (tempWall) {
    drawWall(tempWall, false, false, 0.55);
    const wdx=tempWall.x2-tempWall.x1,wdy=tempWall.y2-tempWall.y1,wlen=Math.hypot(wdx,wdy);
    if(wlen>4 && (!S.simpleView || S.simpleNumbers)){
            const cm=px2cm(wlen);
      const mx=(tempWall.x1+tempWall.x2)/2,my=(tempWall.y1+tempWall.y2)/2;
      const txt=cm+'cm';
      ctx.save();ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      const tw=ctx.measureText(txt).width;
      ctx.fillStyle='rgba(15,23,42,.82)';rr(ctx,mx-tw/2-5,my-9,tw+10,18,4);ctx.fill();
      ctx.fillStyle='#fff';ctx.fillText(txt,mx,my);ctx.restore();
    }
  }
  if(boxSel){
    ctx.save();
    const bx=Math.min(boxSel.x1,boxSel.x2),by=Math.min(boxSel.y1,boxSel.y2);
    const bw=Math.abs(boxSel.x2-boxSel.x1),bh=Math.abs(boxSel.y2-boxSel.y1);
    ctx.fillStyle='rgba(59,130,246,.07)';ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=1/S.zoom;ctx.setLineDash([4/S.zoom,3/S.zoom]);
    ctx.strokeRect(bx,by,bw,bh);ctx.setLineDash([]);ctx.restore();
  }
  if(measure.p1){
    ctx.save();
    const p2=measure.p2||measure.hover;
    if(p2){
      ctx.strokeStyle='#ef4444';ctx.lineWidth=1.5/S.zoom;ctx.setLineDash([5/S.zoom,3/S.zoom]);
      ctx.beginPath();ctx.moveTo(measure.p1.x,measure.p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
      ctx.setLineDash([]);
      const dx=p2.x-measure.p1.x,dy=p2.y-measure.p1.y;
            const cm=px2cm(Math.hypot(dx,dy));
      const mx=(measure.p1.x+p2.x)/2,my=(measure.p1.y+p2.y)/2;
      const txt=cm+'cm';
      if(!S.simpleView || S.simpleNumbers){
        ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        const tw=ctx.measureText(txt).width;
        ctx.fillStyle=measure.p2?'rgba(239,68,68,.9)':'rgba(239,68,68,.7)';
        rr(ctx,mx-tw/2-6,my-10,tw+12,20,5);ctx.fill();
        ctx.fillStyle='#fff';ctx.fillText(txt,mx,my);
      }
    }
    ctx.fillStyle='#ef4444';ctx.strokeStyle='#fff';ctx.lineWidth=1.5/S.zoom;
    for(const pt of[measure.p1,measure.p2].filter(Boolean)){
      ctx.beginPath();ctx.arc(pt.x,pt.y,5/S.zoom,0,Math.PI*2);ctx.fill();ctx.stroke();
    }
    ctx.restore();
  }
  for (const id of S.sel) { const o=getO(id); if(o&&o.visible!==false) drawHandles(o); }
  ctx.restore();
}

function drawObj(o, sel, hov) {
  if (S.simpleView) {
    if (o.type === 'wall') drawSimpleWall(o, sel, hov, 1);
    else if (o.type === 'dimension') drawDimension(o, sel, hov, 1);
    else drawSimpleFurniture(o, sel, hov);
    return;
  }
  if (o.type === 'wall') drawWall(o, sel, hov, 1);
  else if (o.type === 'dimension') drawDimension(o, sel, hov, 1);
  else drawFurniture(o, sel, hov);
}

function drawWall(w, sel, hov, alpha) {
  const dx=w.x2-w.x1, dy=w.y2-w.y1, len=Math.hypot(dx,dy);
  if (len<1) return;
  const t=(w.t||S.wallT)/2, nx=-dy/len*t, ny=dx/len*t;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath();
  ctx.moveTo(w.x1+nx,w.y1+ny); ctx.lineTo(w.x2+nx,w.y2+ny);
  ctx.lineTo(w.x2-nx,w.y2-ny); ctx.lineTo(w.x1-nx,w.y1-ny);
  ctx.closePath();
  ctx.fillStyle=sel?'#1d4ed8':hov?'#6b7280':(w.col||'#334155'); ctx.fill();
  ctx.strokeStyle=sel?'#93c5fd':'#1f2937'; ctx.lineWidth=sel?1.5:0.5; ctx.stroke();
  ctx.restore();
}

function drawSimpleOfficeSize(ow, oh) {
  drawSimpleWorldLabel(`${px2cm(ow)} x ${px2cm(oh)}cm`, ow/2, -16, '#334155');
}


function drawSimpleWall(w, sel, hov, alpha) {
  const dx=w.x2-w.x1, dy=w.y2-w.y1, len=Math.hypot(dx,dy);
  if (len<1) return;
  const t=(w.t||S.wallT)/2, nx=-dy/len*t, ny=dx/len*t;
  const col=sel?'#2563eb':hov?'#3b82f6':'#475569';
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath();
  ctx.moveTo(w.x1+nx,w.y1+ny); ctx.lineTo(w.x2+nx,w.y2+ny);
  ctx.lineTo(w.x2-nx,w.y2-ny); ctx.lineTo(w.x1-nx,w.y1-ny);
  ctx.closePath();
  ctx.strokeStyle=col; ctx.lineWidth=(sel?1.8:1.1)/S.zoom; ctx.stroke();
    if (S.simpleNumbers) drawSimpleWorldLabel(`${px2cm(len)}cm`, (w.x1+w.x2)/2, (w.y1+w.y2)/2, col);
  ctx.restore();
}

function drawSimpleFurniture(o, sel, hov) {
  ctx.save();
  ctx.translate(o.x + o.w/2, o.y + o.h/2);
  ctx.rotate(o.rot * Math.PI/180);
  if (o.flipX) ctx.scale(-1, 1);

  const hw=o.w/2, hh=o.h/2;
  const col=sel?'#2563eb':hov?'#3b82f6':'#475569';
  ctx.strokeStyle=col;
  ctx.lineWidth=(sel?1.8:1.1)/S.zoom;

  if (o.sub==='roomlabel') {
    if (sel) {
      ctx.setLineDash([4/S.zoom, 3/S.zoom]);
      drawSimpleShapePath(ctx, o.sub, hw, hh, o.w, o.h);
      ctx.stroke();
      ctx.setLineDash([]);
    }
   } else if (o.sub==='textlabel') {
    drawSimpleShapePath(ctx, o.sub, hw, hh, o.w, o.h);
    ctx.stroke();
  } else {
    drawSimpleShapePath(ctx, o.sub, hw, hh, o.w, o.h);
    ctx.stroke();
  }

  if (isLabelType(o.sub)) {
    const defaultFs = o.sub==='roomlabel' ? 22 : 18;
    const fs = Math.min(+(o.fontSize || defaultFs), hh * 1.6);
    ctx.font=`bold ${fs}px sans-serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillStyle=o.textColor||'#1e293b';
    const lines=(o.text||(o.sub==='roomlabel'?'공간명':'텍스트')).split('\n');
    const lh=fs*1.25;
    lines.forEach((ln,i)=>ctx.fillText(ln,0,(i-(lines.length-1)/2)*lh));
  } else if (S.simpleNumbers) {
    drawSimpleLocalLabel(ctx, `${px2cm(o.w)} x ${px2cm(o.h)}cm`, 0, 0, col, o.w-8);
  }
  ctx.restore();
}

function drawSimpleShapePath(c, sub, hw, hh, w, h) {
  switch(sub) {
    case 'deskL': {
      const t=Math.min(50, Math.min(w, h)*0.55);
      const cr=Math.min(14,t*0.6);
      c.beginPath();
      c.moveTo(-hw,-hh); c.lineTo(hw,-hh); c.lineTo(hw,-hh+t);
      c.lineTo(-hw+t+cr,-hh+t);
      c.quadraticCurveTo(-hw+t,-hh+t,-hw+t,-hh+t+cr);
      c.lineTo(-hw+t,hh); c.lineTo(-hw,hh); c.closePath();
      break;
    }
    case 'deskS': {
      const r=Math.min(18, h/2, w/2);
      c.beginPath();
      c.moveTo(-hw+r,-hh); c.lineTo(hw,-hh); c.lineTo(hw,hh); c.lineTo(-hw+r,hh);
      c.arcTo(-hw,hh,-hw,hh-r,r);
      c.arcTo(-hw,-hh,-hw+r,-hh,r);
      c.closePath();
      break;
    }
    case 'mtgRnd':
    case 'plant': {
      c.beginPath(); c.ellipse(0,0,Math.max(1,hw-2),Math.max(1,hh-2),0,0,Math.PI*2);
      break;
    }
    default:
      rr(c,-hw,-hh,w,h,3);
  }
}

function drawSimpleWorldLabel(txt, x, y, col) {
  ctx.save();
  ctx.font=`bold ${11/S.zoom}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  const tw=ctx.measureText(txt).width;
  const pad=4/S.zoom;
  ctx.fillStyle='rgba(255,255,255,.92)';
  rr(ctx,x-tw/2-pad,y-8/S.zoom,tw+pad*2,16/S.zoom,3/S.zoom); ctx.fill();
  ctx.fillStyle=col; ctx.fillText(txt,x,y);
  ctx.restore();
}

function drawSimpleLocalLabel(c, txt, x, y, col, maxW) {
  const pad=4;
  let fs=Math.max(7, Math.min(11, Math.min(maxW/5, 11)));
  c.font=`bold ${fs}px sans-serif`;
  let tw=c.measureText(txt).width;
  if (tw > maxW) {
    fs=Math.max(6, fs*maxW/tw);
    c.font=`bold ${fs}px sans-serif`;
    tw=c.measureText(txt).width;
  }
  c.textAlign='center';
  c.textBaseline='middle';
  c.fillStyle='rgba(255,255,255,.92)';
  rr(c,x-tw/2-pad,y-fs/2-pad,tw+pad*2,fs+pad*2,3); c.fill();
  c.fillStyle=col;
  c.fillText(txt,x,y+0.5);
}

// ── isLabelType helper ───────────────────────────────────────────────────────
function isLabelType(sub){ return sub==='textlabel' || sub==='roomlabel'; }

function drawFurniture(o, sel, hov) {
  ctx.save();
  ctx.translate(o.x + o.w/2, o.y + o.h/2);
  ctx.rotate(o.rot * Math.PI/180);
  if (o.flipX) ctx.scale(-1, 1);
  const hw=o.w/2, hh=o.h/2;
  const col = hov ? lighten(o.col||'#dbeafe') : (o.col||'#dbeafe');

  // ── 텍스트 레이블 / 룸 라벨 공통 처리 ────────────────────────────────────
  if (isLabelType(o.sub)) {
    const isRoom = o.sub === 'roomlabel';

    // fill
    ctx.fillStyle = col;
    rr(ctx, -hw, -hh, o.w, o.h, 5);
    ctx.fill();

    // 테두리: textlabel → dashed, roomlabel → 없음
    if (!isRoom) {
      ctx.strokeStyle = sel ? '#2563eb' : hov ? '#64748b' : '#94a3b8';
      ctx.lineWidth = sel ? 1.5 : 1;
      if (!sel) ctx.setLineDash([4, 3]);
      rr(ctx, -hw, -hh, o.w, o.h, 5);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // 텍스트
    const defaultText = isRoom ? '공간명' : '텍스트';
    const defaultFs   = isRoom ? 22 : 18;
    const fs = Math.min(+(o.fontSize || defaultFs), hh * 1.6);
    ctx.font = `bold ${fs}px sans-serif`;
    ctx.fillStyle = o.textColor || '#1e293b';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lines = (o.text || defaultText).split('\n');
    const lh = fs * 1.25;
    lines.forEach((ln, i) => ctx.fillText(ln, 0, (i - (lines.length - 1) / 2) * lh));

  } else {
    // ── 일반 가구 ────────────────────────────────────────────────────────────
    drawShape(ctx, o.sub, hw, hh, o.w, o.h, col, sel);
    if (sel && S.sel.size === 1) {
      const wCm=px2cm(o.w), hCm=px2cm(o.h);
      const label=wCm+'×'+hCm+'cm';
      ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      const tw=ctx.measureText(label).width;
      ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fillRect(-tw/2-3,-hh-20,tw+6,15);
      ctx.fillStyle='#1e40af'; ctx.fillText(label,0,-hh-8);
    }
  }

  // 그룹 인디케이터
  if (o.gid) {
    ctx.strokeStyle='rgba(99,102,241,.5)'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]);
    ctx.strokeRect(-hw-2,-hh-2,o.w+4,o.h+4); ctx.setLineDash([]);
  }
  ctx.restore();
}

function drawHandles(o) {
  if (o.type==='wall'||o.type==='dimension') {
    ctx.fillStyle='#3b82f6'; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    for (const [px,py] of [[o.x1,o.y1],[o.x2,o.y2]]) {
      ctx.beginPath(); ctx.arc(px,py,6,0,Math.PI*2); ctx.fill(); ctx.stroke();
    }
    return;
  }
  ctx.save();
  ctx.translate(o.x+o.w/2, o.y+o.h/2);
  ctx.rotate(o.rot*Math.PI/180);
  const hw=o.w/2, hh=o.h/2;
  ctx.strokeStyle='#3b82f6'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
  ctx.strokeRect(-hw-4,-hh-4,o.w+8,o.h+8); ctx.setLineDash([]);
  ctx.fillStyle='#fff'; ctx.strokeStyle='#3b82f6'; ctx.lineWidth=1.5;
  for (const h of getHandles(o)) {
    ctx.fillRect(h.lx-5,h.ly-5,10,10); ctx.strokeRect(h.lx-5,h.ly-5,10,10);
  }
  ctx.restore();
}

function strokeInsetRect(c,x,y,w,h,inset,r,color,lineWidth=1){
  if(w-inset*2<=2||h-inset*2<=2)return;
  c.strokeStyle=color;
  c.lineWidth=lineWidth;
  rr(c,x+inset,y+inset,w-inset*2,h-inset*2,Math.max(1,r-inset*.35));
  c.stroke();
}
function fillFeet(c,pts,size,color='#94a3b8'){
  c.fillStyle=color;
  for(const [x,y] of pts) rr(c,x-size/2,y-size/2,size,size,1.5), c.fill();
}
function strokeLine(c,x1,y1,x2,y2,color,width=1){
  c.strokeStyle=color; c.lineWidth=width;
  c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke();
}
function fillDot(c,x,y,r,color){
  c.fillStyle=color; c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fill();
}
function drawChairTabs(c,pts,w,h,color,stroke){
  c.fillStyle=color; c.strokeStyle=stroke; c.lineWidth=.8;
  for(const [x,y,rot=0] of pts){
    c.save(); c.translate(x,y); c.rotate(rot);
    rr(c,-w/2,-h/2,w,h,2); c.fill(); c.stroke();
    c.restore();
  }
}
function drawHandle(c,x,y,w,h,color='#64748b'){
  c.fillStyle=color;
  rr(c,x-w/2,y-h/2,w,h,Math.min(2,h/2));
  c.fill();
}
// ─── SHAPE DRAWING ───────────────────────────────────────────────────────────
function drawShape(c, sub, hw, hh, w, h, col, sel) {
  const str=sel?'#2563eb':'#475569';
  const dark=darken(col,0.12);
  c.fillStyle=col; c.strokeStyle=str; c.lineWidth=sel?1.5:1;
  switch(sub) {
    case 'desk1': {
      rr(c,-hw,-hh,w,h,3); c.fill(); c.stroke();
      strokeLine(c,-hw+4,-hh+4,hw-4,-hh+4,'rgba(255,255,255,.55)',.8);
      break;
    }
    case 'desk2': {
      rr(c,-hw,-hh,w,h/2-2,3); c.fill(); c.stroke();
      rr(c,-hw,2,w,h/2-2,3); c.fill(); c.stroke();
      strokeLine(c,-hw+4,0,hw-4,0,darken(col,.18),.8);
      break;
    }
    case 'deskL': {
      const t=50;
      const cr=Math.min(14,t*0.6);
      c.beginPath();
      c.moveTo(-hw,-hh); c.lineTo(hw,-hh); c.lineTo(hw,-hh+t);
      c.lineTo(-hw+t+cr,-hh+t);
      c.quadraticCurveTo(-hw+t,-hh+t,-hw+t,-hh+t+cr);
      c.lineTo(-hw+t,hh); c.lineTo(-hw,hh); c.closePath();
      c.fill(); c.stroke();
      strokeLine(c,-hw+t+6,-hh+t,hw-6,-hh+t,darken(col,.22),1);
      strokeLine(c,-hw+t,-hh+t+6,-hw+t,hh-6,darken(col,.22),1);
      break;
    }
    case 'deskS': {
      const r = 18;
      c.beginPath();
      c.moveTo(-hw + r, -hh);
      c.lineTo(hw, -hh);
      c.lineTo(hw, hh);
      c.lineTo(-hw + r, hh);
      c.arcTo(-hw, hh, -hw, hh - r, r);
      c.arcTo(-hw, -hh, -hw + r, -hh, r);
      c.closePath();
      c.fillStyle = col;
      c.fill();
      c.stroke();
      strokeLine(c,-hw+r+6,-hh+5,hw-6,-hh+5,'rgba(255,255,255,.5)',.8);
      break;
    }
    case 'chair': {

      drawHandle(c,0,hh*.7,16,3,'#64748b');
      break;
    }
    case 'shower': {
      c.fillStyle=col; c.strokeStyle=str; c.lineWidth=sel?1.5:1;
      rr(c,-hw,-hh,w,h,4); c.fill(); c.stroke();
      c.strokeStyle='#64748b'; c.lineWidth=1;
      c.beginPath(); c.arc(hw*.42,hh*.42,5,0,Math.PI*2); c.stroke();
      c.beginPath(); c.arc(hw*.42,hh*.42,2,0,Math.PI*2); c.stroke();
      c.fillStyle='#64748b';
      c.beginPath(); c.arc(-hw*.6,-hh*.6,6,0,Math.PI*2); c.fill();
      c.strokeStyle='#bae6fd'; c.lineWidth=1;
      for(let a=0;a<6;a++){const ang=(a/6)*Math.PI*.8+Math.PI*.2;c.beginPath();c.moveTo(-hw*.6,-hh*.6);c.lineTo(-hw*.6+Math.cos(ang)*14,-hh*.6+Math.sin(ang)*14);c.stroke();}
      c.strokeStyle='#93c5fd'; c.lineWidth=1.5;
      c.beginPath(); c.moveTo(-hw,-hh); c.lineTo(-hw,hh); c.stroke();
      c.beginPath(); c.moveTo(-hw,-hh); c.lineTo(hw,-hh); c.stroke();
      break;
    }

  }
}

function drawDimension(d, sel, hov, alpha) {
  const dx=d.x2-d.x1, dy=d.y2-d.y1, len=Math.hypot(dx,dy);
  if(len<2) return;
  ctx.save(); ctx.globalAlpha=alpha??1;
  const col=sel?'#2563eb':hov?'#3b82f6':(d.col||'#1e40af');
  const ux=dx/len, uy=dy/len;
  const nx=-uy,   ny=ux;
  const tk=9;
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(d.x1,d.y1); ctx.lineTo(d.x2,d.y2); ctx.stroke();
  for(const[px,py] of [[d.x1,d.y1],[d.x2,d.y2]]) {
    ctx.beginPath();
    ctx.moveTo(px+nx*tk-ux*tk, py+ny*tk-uy*tk);
    ctx.lineTo(px-nx*tk+ux*tk, py-ny*tk+uy*tk);
    ctx.stroke();
  }
    const cm=px2cm(len);
  const mx=(d.x1+d.x2)/2, my=(d.y1+d.y2)/2;
  const angle=Math.atan2(dy,dx);
  ctx.save();
  ctx.translate(mx,my); ctx.rotate(angle);
  ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  const txt=cm+'cm', tw=ctx.measureText(txt).width;
  if (!S.simpleView || S.simpleNumbers) {
    ctx.fillStyle='rgba(255,255,255,.9)';
    rr(ctx,-tw/2-4,-14,tw+8,13,3); ctx.fill();
    ctx.fillStyle=col; ctx.fillText(txt,0,-2);
  }
  ctx.restore();
  ctx.restore();
}

function rr(c,x,y,w,h,r) {
  r=Math.min(r||0,Math.abs(w)/2,Math.abs(h)/2);
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath();
}
function lighten(hex){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return '#'+[r,g,b].map(v=>Math.min(255,v+30).toString(16).padStart(2,'0')).join('');}catch{return hex;}}
function darken(hex,a){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return '#'+[r,g,b].map(v=>Math.max(0,Math.floor(v*(1-a))).toString(16).padStart(2,'0')).join('');}catch{return hex;}}
function toHex(c){if(!c)return '#dbeafe';if(c.startsWith('#')&&c.length===7)return c;if(c.startsWith('#')&&c.length===4)return '#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3];return '#dbeafe';}

// ─── HIT TESTING ─────────────────────────────────────────────────────────────
function hitTest(wx,wy) {
  const sorted=[...S.objects].sort((a,b)=>(b.zi||0)-(a.zi||0));
  for (const o of sorted) {
    if (o.visible===false) continue;
    if (o.locked) continue;
    const hit = o.type==='wall'?hitWall(o,wx,wy):o.type==='dimension'?hitWall(o,wx,wy):hitFurn(o,wx,wy);
    if(hit) return o;
  }
  return null;
}
function hitWall(w,wx,wy){const dx=w.x2-w.x1,dy=w.y2-w.y1,len=Math.hypot(dx,dy);if(len<1)return false;const t=((wx-w.x1)*dx+(wy-w.y1)*dy)/(len*len);if(t<0||t>1)return false;const px=w.x1+t*dx-wx,py=w.y1+t*dy-wy;return Math.hypot(px,py)<(w.t||S.wallT)/2+5;}
function hitFurn(o,wx,wy){const cx=o.x+o.w/2,cy=o.y+o.h/2,a=-o.rot*Math.PI/180,dx=wx-cx,dy=wy-cy,lx=dx*Math.cos(a)-dy*Math.sin(a),ly=dx*Math.sin(a)+dy*Math.cos(a);return lx>=-o.w/2&&lx<=o.w/2&&ly>=-o.h/2&&ly<=o.h/2;}
function hitHandle(o,wx,wy){
  if(o.type==='wall'||o.type==='dimension'){if(Math.hypot(wx-o.x1,wy-o.y1)<8)return{id:'p1'};if(Math.hypot(wx-o.x2,wy-o.y2)<8)return{id:'p2'};return null;}
  const cx=o.x+o.w/2,cy=o.y+o.h/2,a=-o.rot*Math.PI/180,dx=wx-cx,dy=wy-cy,lx=dx*Math.cos(a)-dy*Math.sin(a),ly=dx*Math.sin(a)+dy*Math.cos(a);
  for(const h of getHandles(o)){if(Math.abs(lx-h.lx)<8&&Math.abs(ly-h.ly)<8)return h;}
  return null;
}
function getHandles(o){const hw=o.w/2,hh=o.h/2;return[{id:'nw',lx:-hw-4,ly:-hh-4},{id:'n',lx:0,ly:-hh-4},{id:'ne',lx:hw+4,ly:-hh-4},{id:'e',lx:hw+4,ly:0},{id:'se',lx:hw+4,ly:hh+4},{id:'s',lx:0,ly:hh+4},{id:'sw',lx:-hw-4,ly:hh+4},{id:'w',lx:-hw-4,ly:0}];}

// ─── COORD HELPERS ────────────────────────────────────────────────────────────
function s2w(clientX,clientY){const r=cv.getBoundingClientRect(),cx=(clientX-r.left)*(cv.width/r.width),cy=(clientY-r.top)*(cv.height/r.height);return[(cx-S.panX)/S.zoom,(cy-S.panY)/S.zoom];}
function snapV(v){return S.snap?Math.round(v/GRID)*GRID:v;}
function snapP(x,y){return[snapV(x),snapV(y)];}
// ── 기존 getAABB를 아래로 교체 ──

function getAABB(o) {
  if (o.type === 'wall' || o.type === 'dimension')
    return {
      x1: Math.min(o.x1, o.x2), y1: Math.min(o.y1, o.y2),
      x2: Math.max(o.x1, o.x2), y2: Math.max(o.y1, o.y2)
    };

  const rot = (o.rot || 0) % 360;
  // 0° 또는 180°: w/h 유지, 90° 또는 270°: w/h 교환
  if (rot === 0 || rot === 180) {
    return { x1: o.x, y1: o.y, x2: o.x + o.w, y2: o.y + o.h };
  }
  if (rot === 90 || rot === 270) {
    // 중심점 기준으로 w↔h 교환한 바운딩 박스
    const cx = o.x + o.w / 2;
    const cy = o.y + o.h / 2;
    return {
      x1: cx - o.h / 2, y1: cy - o.w / 2,
      x2: cx + o.h / 2, y2: cy + o.w / 2
    };
  }
  // 임의 각도: 4꼭짓점 회전 후 AABB
  const cx = o.x + o.w / 2;
  const cy = o.y + o.h / 2;
  const a = rot * Math.PI / 180;
  const cos = Math.cos(a), sin = Math.sin(a);
  const hw = o.w / 2, hh = o.h / 2;
  const corners = [
    [-hw, -hh], [hw, -hh], [hw, hh], [-hw, hh]
  ];
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const [lx, ly] of corners) {
    const rx = cx + lx * cos - ly * sin;
    const ry = cy + lx * sin + ly * cos;
    minX = Math.min(minX, rx); minY = Math.min(minY, ry);
    maxX = Math.max(maxX, rx); maxY = Math.max(maxY, ry);
  }
  return { x1: minX, y1: minY, x2: maxX, y2: maxY };
}

const EDGE_GLUE = 1.01;
const EDGE_SNAP = GRID / 2 + EDGE_GLUE;

function snapOverlaps(movingIds, nx, ny, nw, nh) {
  const nx2 = nx + nw, ny2 = ny + nh;
  const margin = Math.min(1, Math.min(nw, nh) * 0.3);
  for (const o of S.objects) {
    if (movingIds.has(o.id)) continue;
    if (o.type === 'wall' || o.type === 'dimension') continue;
    const b = getAABB(o);  // 이제 회전 반영된 AABB
    if (nx < b.x2 - margin && nx2 > b.x1 + margin &&
        ny < b.y2 - margin && ny2 > b.y1 + margin) return true;
  }
  return false;
}


function edgeSnap(movingIds, x, y, w, h, thr=EDGE_SNAP){
  const alignThr=EDGE_GLUE;
  const mx1=x, mx2=x+w, my1=y, my2=y+h;
  let bx=null, by=null;

  for(const o of S.objects){
    if(movingIds.has(o.id)) continue;
    if(o.type==='wall' || o.type==='dimension') continue;
    const b=getAABB(o);

    // X 방향 스냅 후보
    const xPairs=[
      [mx1, b.x2, thr], [mx2, b.x1, thr],
      [mx1, b.x1, alignThr], [mx2, b.x2, alignThr]
    ];
    for(const[me, them, limit] of xPairs){
      const d=them-me, ad=Math.abs(d);
      if(ad > 0 && ad <= limit && (bx===null || ad < Math.abs(bx))){
        if(!snapOverlaps(movingIds, x+d, y, w, h)) bx=d;
      }
    }

    // Y 방향 스냅 후보
    const yPairs=[
      [my1, b.y2, thr], [my2, b.y1, thr],
      [my1, b.y1, alignThr], [my2, b.y2, alignThr]
    ];
    for(const[me, them, limit] of yPairs){
      const d=them-me, ad=Math.abs(d);
      if(ad > 0 && ad <= limit && (by===null || ad < Math.abs(by))){
        if(!snapOverlaps(movingIds, x, y+d, w, h)) by=d;
      }
    }
  }

  // 최종: 두 방향 동시 적용 시 겹침 발생하면 한쪽씩만 적용
  if(bx && by && snapOverlaps(movingIds, x+bx, y+by, w, h)){
    // x만 적용 가능하면 x만, 아니면 y만
    if(!snapOverlaps(movingIds, x+bx, y, w, h)) by=0;
    else if(!snapOverlaps(movingIds, x, y+by, w, h)) bx=0;
    else { bx=0; by=0; }
  }

  return [bx??0, by??0];
}
function getBoundsForIds(ids){
  let x1=Infinity,y1=Infinity,x2=-Infinity,y2=-Infinity,found=false;
  for(const id of ids){
    const o=getO(id);
    if(!o||o.type==='wall'||o.type==='dimension')continue;
    const b=getAABB(o);
    x1=Math.min(x1,b.x1);y1=Math.min(y1,b.y1);x2=Math.max(x2,b.x2);y2=Math.max(y2,b.y2);
    found=true;
  }
  return found?{x1,y1,x2,y2,w:x2-x1,h:y2-y1}:null;
}
function moveFurnitureIds(ids,dx,dy){
  if(!dx&&!dy)return;
  for(const id of ids){
    const o=getO(id);
    if(o&&o.type!=='wall'&&o.type!=='dimension'){o.x+=dx;o.y+=dy;}
  }
}
function snapFurnitureIds(ids, thr=EDGE_GLUE){
  const movingIds = new Set(ids);
  const furnIds = [...movingIds].filter(id => {
    const o = getO(id);
    return o && o.type !== 'wall' && o.type !== 'dimension';
  });
  if(furnIds.length === 0) return false;

  // 전체 바운딩 박스 계산
  let x1=Infinity, y1=Infinity, x2=-Infinity, y2=-Infinity;
  for(const id of furnIds){
    const o = getO(id);
    const b = getAABB(o);
    x1=Math.min(x1,b.x1); y1=Math.min(y1,b.y1);
    x2=Math.max(x2,b.x2); y2=Math.max(y2,b.y2);
  }
  const bw=x2-x1, bh=y2-y1;

  // edgeSnap: 이동 대상 전체를 하나의 사각형으로 취급
  const [dx,dy] = edgeSnap(movingIds, x1, y1, bw, bh, thr);

  // 모든 가구 객체에 동일한 delta 적용
  if(dx || dy){
    for(const id of furnIds){
      const o = getO(id);
      if(o){ o.x += dx; o.y += dy; }
    }
  }
  return !!(dx||dy);
}

// ─── INTERACTION STATE ────────────────────────────────────────────────────────
let hover=null, tempWall=null;
const drag={active:false,type:null,sx:0,sy:0,origObjs:[],handle:null,wallSt:null};
let boxSel=null;
const measure={p1:null,p2:null,hover:null};
let tempDim=null;

// ─── GROUP HELPERS ────────────────────────────────────────────────────────────
function getGroup(gid){return S.groups.find(g=>g.id===gid);}
function getGroupObjs(gid){return S.objects.filter(o=>o.gid===gid);}
function expandSelForGroups(){
  const extra=new Set();
  for(const id of S.sel){const o=getO(id);if(o&&o.gid){for(const mo of getGroupObjs(o.gid))extra.add(mo.id);}}
  for(const id of extra)S.sel.add(id);
}

// ─── MOUSE ────────────────────────────────────────────────────────────────────
cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
cv.addEventListener('mouseup', onUp);
cv.addEventListener('mouseleave', ()=>{hover=null;render();});
cv.addEventListener('wheel', e=>{e.preventDefault();const[wx,wy]=s2w(e.clientX,e.clientY);zoomAt(wx,wy,S.zoom*(e.deltaY<0?1.12:.89));},{passive:false});

function onDown(e) {
  e.preventDefault();
  const [wx,wy]=s2w(e.clientX,e.clientY);
  if(e.button===1){drag.active=true;drag.type='pan';drag.sx=e.clientX;drag.sy=e.clientY;cv.style.cursor='grabbing';return;}

  if(S.mode==='measure'){
    if(!measure.p1||measure.p2){measure.p1={x:wx,y:wy};measure.p2=null;}
    else{measure.p2={x:wx,y:wy};}
    render();return;
  }

  if(S.mode==='dim'){
    const[sx,sy]=snapP(wx,wy);
    if(!tempDim){tempDim={type:'dimension',x1:sx,y1:sy,x2:sx,y2:sy,col:'#1e40af',name:'치수',zi:S.objects.length};}
    else{
      if(Math.hypot(tempDim.x2-tempDim.x1,tempDim.y2-tempDim.y1)>4){
        pushUndo();S.objects.push({...tempDim,id:'o'+S.nextId++});refreshLayerList();autoSave();
      }
      tempDim=null;
    }
    render();return;
  }

  if(S.mode==='wall'){
    const wt=$('wc-thick');if(wt)S.wallT=+wt.value||S.wallT;
    pushUndo();
    const[sx,sy]=snapP(wx,wy);
    drag.active=true;drag.type='wall';drag.wallSt={x:sx,y:sy};
    tempWall={type:'wall',x1:sx,y1:sy,x2:sx,y2:sy,t:S.wallT,col:'#334155',name:'벽',zi:0};
    return;
  }

  if(S.sel.size===1){
    const so=getO([...S.sel][0]);
    if(so){const h=hitHandle(so,wx,wy);if(h){pushUndo();drag.active=true;drag.type='resize';drag.handle=h;drag.sx=wx;drag.sy=wy;drag.origObjs=[clone(so)];return;}}
  }

  const hit=hitTest(wx,wy);
  if(hit){
    if(e.shiftKey){S.sel.has(hit.id)?S.sel.delete(hit.id):S.sel.add(hit.id);}
    else{
      if(!S.sel.has(hit.id)){
        S.sel.clear(); S.sel.add(hit.id);
        if(hit.gid) expandSelForGroups();
      }
    }
    pushUndo();
    drag.active=true;drag.type='move';drag.sx=wx;drag.sy=wy;
    drag.origObjs=[...S.sel].map(id=>clone(getO(id)));
    refreshPanel();render();return;
  }
  if(!e.shiftKey)S.sel.clear();
  refreshPanel();render();
  if(S.mode==='select'){
    drag.active=true;drag.type='boxsel';drag.sx=wx;drag.sy=wy;
    boxSel={x1:wx,y1:wy,x2:wx,y2:wy};
  } else {
    drag.active=true;drag.type='pan';drag.sx=e.clientX;drag.sy=e.clientY;
    cv.style.cursor='grabbing';
  }
}

function onMove(e) {
  const[wx,wy]=s2w(e.clientX,e.clientY);
  if(drag.type==='pan'){S.panX+=e.clientX-drag.sx;S.panY+=e.clientY-drag.sy;drag.sx=e.clientX;drag.sy=e.clientY;cv.style.cursor='grabbing';render();return;}
  if(drag.type==='boxsel'){boxSel.x2=wx;boxSel.y2=wy;render();return;}
  if(!drag.active){
    if(S.mode==='measure'&&measure.p1&&!measure.p2){measure.hover={x:wx,y:wy};render();return;}
    if(S.mode==='dim'&&tempDim){tempDim.x2=snapV(wx);tempDim.y2=snapV(wy);render();return;}
    const hit=hitTest(wx,wy);const nh=hit?hit.id:null;if(nh!==hover){hover=nh;cv.style.cursor=nh?'pointer':(S.mode==='wall'||S.mode==='measure'||S.mode==='dim'?'crosshair':'default');render();}return;
  }
  if(drag.type==='wall'){
    let[ex,ey]=snapP(wx,wy);
    if(e.shiftKey){const dx=ex-drag.wallSt.x,dy=ey-drag.wallSt.y,a=Math.round(Math.atan2(dy,dx)/(Math.PI/4))*(Math.PI/4),l=Math.hypot(dx,dy);ex=drag.wallSt.x+snapV(Math.cos(a)*l);ey=drag.wallSt.y+snapV(Math.sin(a)*l);}
    tempWall.x2=ex;tempWall.y2=ey;
    const lenPx=Math.hypot(ex-tempWall.x1,ey-tempWall.y1);
        const wcLen=$('wc-len');if(wcLen&&document.activeElement!==wcLen)wcLen.value=px2cm(lenPx);
    render();return;
  }
  if(drag.type==='move'){
    const ddx=wx-drag.sx,ddy=wy-drag.sy;

    // 1) 먼저 이동 대상 중 wall/dimension이 아닌 가구가 있는지 확인
    const furnOrigList = drag.origObjs.filter(o => o.type !== 'wall' && o.type !== 'dimension');
    const wallOrigList = drag.origObjs.filter(o => o.type === 'wall' || o.type === 'dimension');

    // 2) wall / dimension은 개별 스냅 이동 (기존 로직 유지)
    for(const orig of wallOrigList){
      const o=getO(orig.id); if(!o) continue;
      o.x1=snapV(orig.x1+ddx); o.y1=snapV(orig.y1+ddy);
      o.x2=snapV(orig.x2+ddx); o.y2=snapV(orig.y2+ddy);
    }

    // 3) 가구 객체가 있으면 "기준점 하나만 스냅" 후 전체를 같은 delta로 이동
    if(furnOrigList.length > 0){
      // 기준점: 첫 번째 가구 원본의 좌상단
      const ref = furnOrigList[0];
      const snappedX = snapV(ref.x + ddx);
      const snappedY = snapV(ref.y + ddy);
      const snapDx = snappedX - ref.x;
      const snapDy = snappedY - ref.y;

      // 모든 가구 객체에 동일한 delta 적용 (개별 snapV 하지 않음)
      for(const orig of furnOrigList){
        const o=getO(orig.id); if(!o) continue;
        o.x = orig.x + snapDx;
        o.y = orig.y + snapDy;
      }
    }

    // 4) edgeSnap도 그룹 전체 바운딩 박스 기준으로 한 번만 적용
    snapFurnitureIds(S.sel, Math.max(8/S.zoom, EDGE_SNAP));
    refreshPanel();render();return;
  }
  if(drag.type==='resize'){
    const o=getO([...S.sel][0]);const orig=drag.origObjs[0];if(!o||o.type==='wall')return;
    const ddx=wx-drag.sx,ddy=wy-drag.sy,a=-o.rot*Math.PI/180,ldx=ddx*Math.cos(a)-ddy*Math.sin(a),ldy=ddx*Math.sin(a)+ddy*Math.cos(a),id=drag.handle.id;
    let nx=orig.x,ny=orig.y,nw=orig.w,nh=orig.h;
    if(id.includes('e'))nw=Math.max(GRID,snapV(orig.w+ldx));
    if(id.includes('s'))nh=Math.max(GRID,snapV(orig.h+ldy));
    if(id.includes('w')){nw=Math.max(GRID,snapV(orig.w-ldx));nx=orig.x+orig.w-nw;}
    if(id.includes('n')){nh=Math.max(GRID,snapV(orig.h-ldy));ny=orig.y+orig.h-nh;}
    o.x=nx;o.y=ny;o.w=nw;o.h=nh;
    snapFurnitureIds(S.sel, Math.max(8/S.zoom, EDGE_SNAP));
    refreshPanel();render();return;
  }
}

function onUp(e) {
  if(!drag.active)return;
  if(drag.type==='boxsel'){
    if(boxSel){
      const bx1=Math.min(boxSel.x1,boxSel.x2),bx2=Math.max(boxSel.x1,boxSel.x2);
      const by1=Math.min(boxSel.y1,boxSel.y2),by2=Math.max(boxSel.y1,boxSel.y2);
      if(bx2-bx1>3||by2-by1>3){
        for(const o of S.objects){
          if(o.visible===false||o.locked)continue;
          const b=getAABB(o);
          if(b.x1>=bx1&&b.x2<=bx2&&b.y1>=by1&&b.y2<=by2)S.sel.add(o.id);
        }
      }
      boxSel=null;
    }
    drag.active=false;drag.type=null;
    refreshPanel();refreshLayerList();render();return;
  }
  if(drag.type==='wall'&&tempWall){
    if(Math.hypot(tempWall.x2-tempWall.x1,tempWall.y2-tempWall.y1)>GRID/2){S.objects.push({...tempWall,id:'o'+S.nextId++});}
    else S.undoStack.pop();
    tempWall=null;const wl=$('wc-len');if(wl)wl.value='';refreshLayerList();
  }
  if(drag.type==='move'||drag.type==='resize') snapFurnitureIds(S.sel, EDGE_SNAP);
  drag.active=false;drag.type=null;
  cv.style.cursor=(S.mode==='wall'||S.mode==='measure')?'crosshair':'default';
  refreshLayerList();render();
  autoSave();
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  const tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.key==='Delete'||e.key==='Backspace'){deleteSelected();}
  else if((e.key==='r'||e.key==='R')&&!e.ctrlKey){rotateSelected();}
  else if(e.key==='f'||e.key==='F'){flipSelected();}
  else if(e.ctrlKey&&e.shiftKey&&(e.key==='g'||e.key==='G')){e.preventDefault();ungroupSelected();}
  else if(e.ctrlKey&&(e.key==='g'||e.key==='G')){e.preventDefault();groupSelected();}
  else if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  else if(e.ctrlKey&&(e.key==='y'||e.key==='Y')){e.preventDefault();redo();}
  else if(e.ctrlKey&&e.key==='c'){e.preventDefault();copySelected();}
  else if(e.ctrlKey&&e.key==='v'){e.preventDefault();pasteClipboard();}
  else if(e.key==='Escape'||e.key==='s'||e.key==='S'){S.sel.clear();setMode('select');}
  else if(e.key==='w'||e.key==='W'){setMode('wall');}
  else if((e.key==='v'||e.key==='V')&&!e.ctrlKey){toggleSimpleView();}
  else if((e.key==='n'||e.key==='N')&&!e.ctrlKey){toggleSimpleNumbers();}
  else if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){
    if(!S.sel.size)return;
    e.preventDefault();
    const step=e.shiftKey?GRID:1;
    const dx=e.key==='ArrowLeft'?-1:e.key==='ArrowRight'?1:0;
    const dy=e.key==='ArrowUp'?-1:e.key==='ArrowDown'?1:0;
    nudgeSelected(dx,dy,step);
  }
});

        rr(ictx,-def.w/2,-def.h/2,def.w,def.h,3);ictx.fill();ictx.stroke();

      }

      const ictx=ic.getContext('2d');const sc=Math.min(36/def.w,28/def.h);
      ictx.save();ictx.translate(20,16);ictx.scale(sc,sc);drawShape(ictx,def.sub,def.w/2,def.h/2,def.w,def.h,def.col,false);ictx.restore();

function startPalDrag(e,def){
  e.preventDefault();palDef=def;palDragging=true;
  ghost.width=def.w;ghost.height=def.h;
  gctx.clearRect(0,0,def.w,def.h);gctx.save();gctx.translate(def.w/2,def.h/2);drawShape(gctx,def.sub,def.w/2,def.h/2,def.w,def.h,def.col,false);gctx.restore();
  const gw=def.w*S.zoom,gh=def.h*S.zoom;
  ghost.style.cssText=`position:fixed;pointer-events:none;z-index:9999;display:block;opacity:.75;width:${gw}px;height:${gh}px;left:${e.clientX-gw/2}px;top:${e.clientY-gh/2}px`;
}
document.addEventListener('mousemove',e=>{if(!palDragging)return;const gw=parseFloat(ghost.style.width)||palDef.w,gh=parseFloat(ghost.style.height)||palDef.h;ghost.style.left=(e.clientX-gw/2)+'px';ghost.style.top=(e.clientY-gh/2)+'px';});
document.addEventListener('mouseup',e=>{
  if(!palDragging)return;palDragging=false;ghost.style.display='none';
  const r=cv.getBoundingClientRect();
  if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
    const[wx,wy]=s2w(e.clientX,e.clientY);const def=palDef;const[sx,sy]=snapP(wx-def.w/2,wy-def.h/2);
    pushUndo();
    const o={
      id:'o'+S.nextId++, type:'furniture', sub:def.sub,
      x:sx, y:sy, w:def.w, h:def.h, rot:0, flipX:false,
      col:def.col, name:def.name, zi:S.objects.length,
      visible:true, locked:false,
      // ── 텍스트 초기값: textlabel / roomlabel 분기 ──
      ...(def.sub==='textlabel' ? {text:'텍스트', fontSize:18, textColor:'#1e293b'} :
          def.sub==='roomlabel' ? {text:'텍스트',  fontSize:22, textColor:'#1e293b'} : {})
    };
    S.objects.push(o);S.sel.clear();S.sel.add(o.id);
    snapFurnitureIds(S.sel, Math.max(8/S.zoom, EDGE_SNAP));
    refreshPanel();refreshLayerList();render();autoSave();
  }
  palDef=null;
});

// ─── OPERATIONS ──────────────────────────────────────────────────────────────
function getO(id){return S.objects.find(o=>o.id===id);}
function clone(o){return o?JSON.parse(JSON.stringify(o)):null;}

function deleteSelected(){
  if(!S.sel.size)return;
  pushUndo();
  S.objects=S.objects.filter(o=>!S.sel.has(o.id));
  for(const g of S.groups){g.childIds=g.childIds.filter(id=>S.objects.find(o=>o.id===id));}
  S.groups=S.groups.filter(g=>g.childIds.length>0);
  S.sel.clear();refreshPanel();refreshLayerList();render();autoSave();
}
function rotateSelected(){
  if(!S.sel.size)return;
  pushUndo();
  for(const id of S.sel){const o=getO(id);if(o&&o.type==='furniture')o.rot=(o.rot+90)%360;}
  refreshPanel();render();autoSave();
}
function flipSelected(){
  if(!S.sel.size)return;
  pushUndo();
  for(const id of S.sel){const o=getO(id);if(o&&o.type==='furniture')o.flipX=!o.flipX;}
  refreshPanel();render();autoSave();
}
function groupSelected(){
  if(S.sel.size<2)return;
  pushUndo();
  const gid='g'+S.nextGid++;
  const name='그룹 '+(S.groups.length+1);
  const childIds=[...S.sel];
  for(const id of childIds){const o=getO(id);if(o)o.gid=gid;}
  S.groups.push({id:gid,name,childIds,collapsed:false});
  refreshPanel();refreshLayerList();render();autoSave();
}
function ungroupSelected(){
  if(!S.sel.size)return;
  pushUndo();
  const gidsToRemove=new Set();
  for(const id of S.sel){const o=getO(id);if(o&&o.gid){gidsToRemove.add(o.gid);delete o.gid;}}
  S.groups=S.groups.filter(g=>!gidsToRemove.has(g.id));
  refreshPanel();refreshLayerList();render();autoSave();
}
function alignSelected(mode){
  if(S.sel.size<2)return;
  const objs=[...S.sel].map(id=>getO(id)).filter(o=>o&&o.type==='furniture');
  if(objs.length<2)return;
  pushUndo();
  const bounds=objs.map(o=>{const b=getAABB(o);return{o,b,cx:(b.x1+b.x2)/2,cy:(b.y1+b.y2)/2};});
  switch(mode){
    case 'left':{
      const minX=Math.min(...bounds.map(b=>b.b.x1));
      for(const b of bounds){const dx=minX-b.b.x1;b.o.x+=dx;}
      break;
    }
    case 'right':{
      const maxX=Math.max(...bounds.map(b=>b.b.x2));
      for(const b of bounds){const dx=maxX-b.b.x2;b.o.x+=dx;}
      break;
    }
    case 'center-h':{
      const avg=bounds.reduce((s,b)=>s+b.cx,0)/bounds.length;
      for(const b of bounds){const dx=avg-b.cx;b.o.x+=dx;}
      break;
    }
    case 'top':{
      const minY=Math.min(...bounds.map(b=>b.b.y1));
      for(const b of bounds){const dy=minY-b.b.y1;b.o.y+=dy;}
      break;
    }
    case 'bottom':{
      const maxY=Math.max(...bounds.map(b=>b.b.y2));
      for(const b of bounds){const dy=maxY-b.b.y2;b.o.y+=dy;}
      break;
    }
    case 'center-v':{
      const avg=bounds.reduce((s,b)=>s+b.cy,0)/bounds.length;
      for(const b of bounds){const dy=avg-b.cy;b.o.y+=dy;}
      break;
    }
  }
  refreshPanel();render();autoSave();
}
function distributeSelected(axis){
  if(S.sel.size<3)return;
  const objs=[...S.sel].map(id=>getO(id)).filter(o=>o&&o.type==='furniture');
  if(objs.length<3)return;
  pushUndo();
  if(axis==='h'){
    const items=objs.map(o=>{const b=getAABB(o);return{o,cx:(b.x1+b.x2)/2,w:b.x2-b.x1};});
    items.sort((a,b)=>a.cx-b.cx);
    const first=items[0], last=items[items.length-1];
    const totalSpan=last.cx-first.cx;
    const step=totalSpan/(items.length-1);
    for(let i=1;i<items.length-1;i++){
      const target=first.cx+step*i;
      const dx=target-items[i].cx;
      items[i].o.x+=dx;
    }
  }else{
    const items=objs.map(o=>{const b=getAABB(o);return{o,cy:(b.y1+b.y2)/2,h:b.y2-b.y1};});
    items.sort((a,b)=>a.cy-b.cy);
    const first=items[0], last=items[items.length-1];
    const totalSpan=last.cy-first.cy;
    const step=totalSpan/(items.length-1);
    for(let i=1;i<items.length-1;i++){
      const target=first.cy+step*i;
      const dy=target-items[i].cy;
      items[i].o.y+=dy;
    }
  }
  refreshPanel();render();autoSave();
}
const CUSTOM_LS_KEY='office-custom-objs';
function loadCustomObjs(){
  try{const raw=localStorage.getItem(CUSTOM_LS_KEY);S.customObjs=raw?JSON.parse(raw):[];}catch(e){S.customObjs=[];}
  refreshCustomPalette();

function saveCustomObjsToLS(){
  try{localStorage.setItem(CUSTOM_LS_KEY,JSON.stringify(S.customObjs));}catch(e){}
}
function saveAsCustomObj(){
  if(!S.sel.size)return;
  const allIds=new Set(S.sel);
  for(const id of S.sel){const o=getO(id);if(o&&o.gid){for(const mo of getGroupObjs(o.gid))allIds.add(mo.id);}}
  const objs=[...allIds].map(id=>clone(getO(id))).filter(Boolean);
  if(!objs.length)return;
  // 바운딩 박스 계산하여 원점 기준으로 정규화
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const o of objs){
    if(o.type==='wall'||o.type==='dimension'){
      minX=Math.min(minX,o.x1,o.x2);minY=Math.min(minY,o.y1,o.y2);
      maxX=Math.max(maxX,o.x1,o.x2);maxY=Math.max(maxY,o.y1,o.y2);
    }else{
      const b=getAABB(o);
      minX=Math.min(minX,b.x1);minY=Math.min(minY,b.y1);
      maxX=Math.max(maxX,b.x2);maxY=Math.max(maxY,b.y2);
    }
  }
  // 원점 기준으로 오프셋 적용
  for(const o of objs){
    if(o.type==='wall'||o.type==='dimension'){o.x1-=minX;o.y1-=minY;o.x2-=minX;o.y2-=minY;}
    else{o.x-=minX;o.y-=minY;}
    delete o.gid; // 그룹 ID 제거 (배치 시 새로 그룹화)
  }
  const w=Math.round(maxX-minX),h=Math.round(maxY-minY);
  const name=prompt('사용자 오브젝트 이름을 입력하세요:','사용자 오브젝트 '+(S.customObjs.length+1));
  if(!name)return;
  const gidsUsed=new Set([...allIds].map(id=>getO(id)?.gid).filter(Boolean));
  const groups=S.groups.filter(g=>gidsUsed.has(g.id)).map(g=>{
    const cg=clone(g);
    cg.childIds=cg.childIds.filter(id=>allIds.has(id));
    return cg;
  });
  // 그룹 내 객체 gid도 정규화
  const gidMap={};
  for(const g of groups){const ng='cg'+Date.now()+'_'+Math.random().toString(36).slice(2,6);gidMap[g.id]=ng;g.id=ng;}
  for(const o of objs){if(o.gid&&gidMap[o.gid])o.gid=gidMap[o.gid];}
  const custom={id:'cu'+Date.now(),name,w,h,objects:objs,groups,col:'#e8d5f5',created:Date.now()};
  S.customObjs.push(custom);
  saveCustomObjsToLS();
  refreshCustomPalette();
  alert(`"${name}" 사용자 오브젝트가 저장되었습니다.`);
}
function placeCustomObj(customId){
  const custom=S.customObjs.find(c=>c.id===customId);
  if(!custom)return;
  pushUndo();
  const idMap={},gidMap={};
  const newObjs=custom.objects.map(o=>{
    const newId='o'+S.nextId++;
    idMap[o.id]=newId;
    return{...clone(o),id:newId};
  });
  const newGroups=(custom.groups||[]).map(g=>{
    const newGid='g'+S.nextGid++;
    gidMap[g.id]=newGid;
    return{...clone(g),id:newGid,childIds:g.childIds.map(id=>idMap[id]).filter(Boolean)};
  });
  for(const o of newObjs){if(o.gid&&gidMap[o.gid])o.gid=gidMap[o.gid];}
  // 캔버스 중앙에 배치
  const cx=(cv.width/2-S.panX)/S.zoom-custom.w/2;
  const cy=(cv.height/2-S.panY)/S.zoom-custom.h/2;
  const sx=snapV(cx),sy=snapV(cy);
  for(const o of newObjs){
    if(o.type==='wall'||o.type==='dimension'){o.x1+=sx;o.y1+=sy;o.x2+=sx;o.y2+=sy;}
    else{o.x+=sx;o.y+=sy;}
    o.zi=S.objects.length;
  }
  S.objects.push(...newObjs);
  S.groups.push(...newGroups);
  S.sel.clear();
  for(const o of newObjs)S.sel.add(o.id);
  refreshPanel();refreshLayerList();render();autoSave();
}

function copySelected(){
  if(!S.sel.size)return;
  const allIds=new Set(S.sel);
  for(const id of S.sel){const o=getO(id);if(o&&o.gid){for(const mo of getGroupObjs(o.gid))allIds.add(mo.id);}}

  const gidsUsed=new Set(copiedObjs.map(o=>o.gid).filter(Boolean));
  const copiedGroups=S.groups.filter(g=>gidsUsed.has(g.id)).map(g=>clone(g));
  S.clipboard={objects:copiedObjs,groups:copiedGroups};
}
function pasteClipboard(){
  if(!S.clipboard)return;
  pushUndo();
  const idMap={}, gidMap={};
  const offset=GRID*2;
  const newObjs=S.clipboard.objects.map(o=>{
    const newId='o'+S.nextId++;
    idMap[o.id]=newId;
    return{...o,id:newId,x:(o.x||0)+offset,y:(o.y||0)+offset};
  });
  const newGroups=S.clipboard.groups.map(g=>{
    const newGid='g'+S.nextGid++;
    gidMap[g.id]=newGid;
    return{...g,id:newGid,name:g.name+' (복사)',childIds:g.childIds.map(id=>idMap[id]).filter(Boolean)};
  });
  for(const o of newObjs){if(o.gid&&gidMap[o.gid])o.gid=gidMap[o.gid];}
  S.objects.push(...newObjs);
  S.groups.push(...newGroups);
  S.sel.clear();
  for(const o of newObjs)S.sel.add(o.id);
  snapFurnitureIds(S.sel, EDGE_SNAP);

}

function pushUndo(){
  S.undoStack.push({objs:JSON.parse(JSON.stringify(S.objects)),grps:JSON.parse(JSON.stringify(S.groups)),nid:S.nextId,ngid:S.nextGid});
  if(S.undoStack.length>60)S.undoStack.shift();
  S.redoStack=[];updateUndoButtons();
}
function undo(){
  if(!S.undoStack.length)return;
  S.redoStack.push({objs:JSON.parse(JSON.stringify(S.objects)),grps:JSON.parse(JSON.stringify(S.groups)),nid:S.nextId,ngid:S.nextGid});
  const s=S.undoStack.pop();S.objects=s.objs;S.groups=s.grps||[];S.nextId=s.nid;S.nextGid=s.ngid||S.nextGid;
  S.sel.clear();refreshPanel();refreshLayerList();render();updateUndoButtons();autoSave();
}
function redo(){
  if(!S.redoStack.length)return;
  S.undoStack.push({objs:JSON.parse(JSON.stringify(S.objects)),grps:JSON.parse(JSON.stringify(S.groups)),nid:S.nextId,ngid:S.nextGid});
  const s=S.redoStack.pop();S.objects=s.objs;S.groups=s.grps||[];S.nextId=s.nid;S.nextGid=s.ngid||S.nextGid;

    if(isDim){
      $('p-x').value=px2cm(o.x1);$('p-y').value=px2cm(o.y1);$('p-w').value=px2cm(o.x2-o.x1);$('p-h').value=px2cm(o.y2-o.y1);

      $('p-x').value=px2cm(o.x1);$('p-y').value=px2cm(o.y1);$('p-w').value=px2cm(o.x2-o.x1);$('p-h').value=px2cm(o.y2-o.y1);

function applyPropGeom(){
  if(S.sel.size!==1)return;
  const o=getO([...S.sel][0]);if(!o)return;
  if(o.type==='wall'||o.type==='dimension'){
    const x=cm2px(parseFloat($('p-x').value)||0),y=cm2px(parseFloat($('p-y').value)||0);
    const dx=cm2px(parseFloat($('p-w').value)||0),dy=cm2px(parseFloat($('p-h').value)||0);
    o.x1=x;o.y1=y;o.x2=x+dx;o.y2=y+dy;
  }else{
    o.x=cm2px(parseFloat($('p-x').value)||0);o.y=cm2px(parseFloat($('p-y').value)||0);
    let nw=Math.max(1,cm2px(parseFloat($('p-w').value)||0));
    let nh=Math.max(1,cm2px(parseFloat($('p-h').value)||0));
    // 원형 오브젝트: W나 H 변경 시 다른 쪽도 동기화
    const circularSubs=['mtgRnd','coffeeTable','plant','column'];
    if(circularSubs.includes(o.sub)){
      if(nw!==o.w && nh===o.h) nh=nw;
      else if(nh!==o.h && nw===o.w) nw=nh;
      else if(nw!==o.w && nh!==o.h){ const bigger=Math.max(nw,nh); nw=bigger; nh=bigger; }
    }
    o.w=nw;o.h=nh;
    o.rot=parseFloat($('p-rot').value)||0;
  }
  snapFurnitureIds(S.sel, EDGE_GLUE);
  refreshPanel();
  render();
}

function refreshLayerList(){
  const ll=$('layer-list');ll.innerHTML='';
  const allObjs=[...S.objects].reverse();
  const usedGids=new Set(S.objects.map(o=>o.gid).filter(Boolean));
  const validGroups=S.groups.filter(g=>usedGids.has(g.id));
  const inGroup=new Set();
  for(const g of validGroups)for(const cid of g.childIds)inGroup.add(cid);
  function makeItem(o){
    const it=document.createElement('div');
    const isSel=S.sel.has(o.id);
    it.className='layer-item'+(isSel?' sel':'')+(o.visible===false?' hidden-obj':'')+(o.locked?' locked-obj':'');
    const visBtn=document.createElement('button');
    visBtn.className='lbtn'+(o.visible!==false?' active-state':'');
    visBtn.title='표시/숨기기';visBtn.textContent=o.visible===false?'🙈':'👁';
    visBtn.addEventListener('click',ev=>toggleVis(o.id,ev));
    const dot=document.createElement('span');dot.className='ldot';
    dot.style.background=o.col||(o.type==='wall'?'#334155':'#94a3b8');
    const typePrefix = o.type==='wall'?'━ ': (o.flipX?'↔ ':'');
    const nm=document.createElement('span');nm.className='lname';nm.textContent=typePrefix+o.name;
    const lockBtn=document.createElement('button');
    lockBtn.className='lbtn'+(o.locked?' active-state':'');
    lockBtn.title='잠금/해제';lockBtn.textContent=o.locked?'🔒':'🔓';
    lockBtn.addEventListener('click',ev=>toggleLock(o.id,ev));
    it.appendChild(visBtn);it.appendChild(dot);it.appendChild(nm);it.appendChild(lockBtn);
    it.addEventListener('click',()=>{S.sel.clear();S.sel.add(o.id);if(o.gid)expandSelForGroups();refreshPanel();render();});
    return it;
  }
  for(const g of validGroups){
    const grpObjs=allObjs.filter(o=>o.gid===g.id);
    if(!grpObjs.length)continue;
    const isGrpSel=grpObjs.every(o=>S.sel.has(o.id));
    const grpDiv=document.createElement('div');grpDiv.className='layer-group';
    const hdr=document.createElement('div');
    hdr.className='layer-group-hdr'+(isGrpSel?' sel-group':'');
    const arrow=document.createElement('span');arrow.className='layer-group-arrow'+(g.collapsed?' collapsed':'');arrow.textContent='▼';
    const icon=document.createElement('span');icon.textContent='📁';icon.style.fontSize='11px';
    const nm=document.createElement('span');nm.className='lname';nm.textContent=g.name;
    const cnt=document.createElement('span');cnt.style.cssText='font-size:10px;color:#94a3b8;flex-shrink:0';cnt.textContent='('+grpObjs.length+')';
    hdr.appendChild(arrow);hdr.appendChild(icon);hdr.appendChild(nm);hdr.appendChild(cnt);
    hdr.addEventListener('click',()=>{S.sel.clear();for(const o of grpObjs)S.sel.add(o.id);refreshPanel();render();});
    arrow.addEventListener('click',ev=>{ev.stopPropagation();g.collapsed=!g.collapsed;refreshLayerList();});
    grpDiv.appendChild(hdr);
    if(!g.collapsed){
      const children=document.createElement('div');children.className='layer-group-children';
      for(const o of grpObjs)children.appendChild(makeItem(o));
      grpDiv.appendChild(children);
    }
    ll.appendChild(grpDiv);
  }
  const ungrouped=allObjs.filter(o=>!inGroup.has(o.id));
  if(validGroups.length>0&&ungrouped.length>0){const sep=document.createElement('div');sep.className='layer-sep';ll.appendChild(sep);}
  for(const o of ungrouped){ll.appendChild(makeItem(o));}
}
function layerMove(dir){

  if(target<0||target>=S.objects.length)return;
  pushUndo();[S.objects[idx],S.objects[target]]=[S.objects[target],S.objects[idx]];

}

const V3 = {
  active:false, scene:null, camera:null, renderer:null, controls:null,
  root:null, floor:null, anim:null, fallbackControls:null
};
new ResizeObserver(()=>resize3DView()).observe(cont);

function get3DSettings(){

    wallH:Math.max(0.5, parseFloat($('three-wall-height').value)||2.4),
    sillH:Math.max(0.1, parseFloat($('three-sill-height').value)||0.82),
    floorMat:$('three-floor-mat').value,
    wallMat:$('three-wall-mat').value
  };
}
function matColor(kind, value){
  const colors={
    floor:{wood:0xcaa76d, concrete:0xbfc5cb, tile:0xdce8f2},
    wall:{white:0xf8fafc, gray:0x9aa4af, brick:0xb15c45}
  };
  return (colors[kind]&&colors[kind][value])||0xdbe4ee;
}
function set3DStatus(msg){$('three-status').textContent=msg||'';}
function toggle3DView(){set3DMode(!V3.active);}
function set3DMode(on){
  V3.active=!!on;

  $('btn-3d-view').classList.toggle('active',V3.active);
  $('btn-3d-view').textContent=V3.active?'2D 보기':'3D 보기';

function rebuild3DView(){
  if(!V3.active){set3DMode(true);return;}
  if(!window.THREE){set3DStatus('Three.js CDN을 불러오는 중입니다. 잠시 후 3D 재생성을 눌러주세요.');return;}

}
function init3DView(){
  V3.root=$('three-canvas-host');
  if(!V3.scene)V3.scene=new THREE.Scene();
  if(!V3.camera)V3.camera=new THREE.PerspectiveCamera(45,1,0.05,500);
  if(!V3.renderer){
    V3.renderer=new THREE.WebGLRenderer({antialias:true});
    V3.renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
    V3.renderer.shadowMap.enabled=true;
    V3.root.appendChild(V3.renderer.domElement);
    const OrbitCtor=window.OrbitControls||THREE.OrbitControls;
    if(OrbitCtor){
      V3.controls=new OrbitCtor(V3.camera,V3.renderer.domElement);
      V3.controls.enableDamping=true;
      V3.controls.mouseButtons={LEFT:THREE.MOUSE.ROTATE,MIDDLE:THREE.MOUSE.DOLLY,RIGHT:THREE.MOUSE.PAN};
    } else {
      V3.fallbackControls=makeFallback3DControls(V3.renderer.domElement);
      set3DStatus('OrbitControls CDN을 사용할 수 없어 기본 드래그 조작으로 표시합니다.');
    }
    V3.renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
  }
  const OrbitCtor=window.OrbitControls||THREE.OrbitControls;
  if(!V3.controls&&OrbitCtor){
    V3.controls=new OrbitCtor(V3.camera,V3.renderer.domElement);
    V3.controls.enableDamping=true;
    V3.controls.mouseButtons={LEFT:THREE.MOUSE.ROTATE,MIDDLE:THREE.MOUSE.DOLLY,RIGHT:THREE.MOUSE.PAN};
    V3.fallbackControls=null;
  }

  if(V3.fallbackControls)V3.fallbackControls.attach(V3.camera);

function clear3DScene(){
  if(!V3.scene)return;
  while(V3.scene.children.length){
    const obj=V3.scene.children.pop();
    obj.traverse?.(child=>{
      child.geometry?.dispose?.();
      if(Array.isArray(child.material))child.material.forEach(m=>m.dispose?.());
      else child.material?.dispose?.();
    });
  }
}
function build3DScene(){
  clear3DScene();
  const settings=get3DSettings();
  V3.scene.background=new THREE.Color(0xeef2f7);
  V3.scene.add(new THREE.HemisphereLight(0xffffff,0x94a3b8,1.15));
  const sun=new THREE.DirectionalLight(0xffffff,1.4);
  sun.position.set(-8,12,7);sun.castShadow=true;V3.scene.add(sun);

  const floorMat=new THREE.MeshStandardMaterial({color:matColor('floor',settings.floorMat),roughness:.72,metalness:.02});
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(S.offW,S.offH),floorMat);
  floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;V3.scene.add(floor);V3.floor=floor;
  addFloorGrid3D(settings.floorMat==='tile'?0x7aa4c7:0xd7dee8);

  for(const o of S.objects){
    if(o.visible===false)continue;
    if(o.type==='wall')add3DWall(o,settings);
    else if(o.type==='furniture'&&!isLabelType(o.sub))add3DFurniture(o,settings);
  }
}
function add3DWall(o,settings){
  const dx=o.x2-o.x1,dy=o.y2-o.y1,len=Math.hypot(dx,dy)/PPM;
  if(len<0.03)return;
  const thick=Math.max((o.t||S.wallT)/PPM,0.08);
  const h=settings.wallH;
  const geo=new THREE.BoxGeometry(len,h,thick);
  const mat=new THREE.MeshStandardMaterial({color:matColor('wall',settings.wallMat),roughness:.64});
  const mesh=new THREE.Mesh(geo,mat);
  const mx=(o.x1+o.x2)/2/PPM-S.offW/2, mz=(o.y1+o.y2)/2/PPM-S.offH/2;
  mesh.position.set(mx,h/2,mz);
  mesh.rotation.y=-Math.atan2(dy,dx);
  mesh.castShadow=true;mesh.receiveShadow=true;V3.scene.add(mesh);
}

// - 파트 좌표 lx/lz는 2D 오브젝트 중심 기준 px 좌표라서, 2D drawShape와 같은 감각으로 수정할 수 있다.

// - 책상/테이블: 상판+다리, 의자/소파: 좌판+등받이+팔걸이, 수납/기기: 본체+분할선,
//   구조/시설: 문/창문/계단/기둥처럼 2D 심볼의 핵심 형태가 보이는 파트로 나눈다.
function add3DFurniture(o,settings){
  const g=new THREE.Group();

    case 'mtgRect':

    case 'sink':
