function addFloorGrid3D(color){
  const verts=[];
  const x1=-S.offW/2,x2=S.offW/2,z1=-S.offH/2,z2=S.offH/2;
  for(let x=Math.ceil(x1);x<=x2+.001;x+=1){verts.push(x,.01,z1,x,.01,z2);}
  for(let z=Math.ceil(z1);z<=z2+.001;z+=1){verts.push(x1,.01,z,x2,.01,z);}
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  const lines=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color,transparent:true,opacity:.72}));
  V3.scene.add(lines);
}
function material3D(color,roughness=.6){
  return new THREE.MeshStandardMaterial({color,roughness,metalness:.02});
}
function glassMaterial3D(color=0x93c5fd,opacity=.38){
  return new THREE.MeshPhysicalMaterial({color,transparent:true,opacity,roughness:.08,metalness:.02,transmission:.25});
}
function addPart3D(group,lx,lz,w,d,h,y,color){
  const mesh=new THREE.Mesh(
    new THREE.BoxGeometry(Math.max(w/PPM,.03),Math.max(h,.02),Math.max(d/PPM,.03)),
    material3D(color)
  );
  mesh.position.set(lx/PPM,y,lz/PPM);
  mesh.castShadow=true;mesh.receiveShadow=true;
  group.add(mesh);
  return mesh;
}
function addGlassPart3D(group,lx,lz,w,d,h,y,color=0x93c5fd,opacity=.38){
  const mesh=new THREE.Mesh(
    new THREE.BoxGeometry(Math.max(w/PPM,.03),Math.max(h,.02),Math.max(d/PPM,.03)),
    glassMaterial3D(color,opacity)
  );
  mesh.position.set(lx/PPM,y,lz/PPM);
  mesh.castShadow=false;mesh.receiveShadow=true;
  group.add(mesh);
  return mesh;
}
function addCylinder3D(group,lx,lz,rPx,h,y,color,segments=24){
  const mesh=new THREE.Mesh(
    new THREE.CylinderGeometry(Math.max(rPx/PPM,.03),Math.max(rPx/PPM,.03),Math.max(h,.03),segments),
    material3D(color)
  );
  mesh.position.set(lx/PPM,y,lz/PPM);
  mesh.castShadow=true;mesh.receiveShadow=true;
  group.add(mesh);
  return mesh;
}
function addSphere3D(group,lx,lz,rPx,y,color,scaleY=.8,segments=24){
  const mesh=new THREE.Mesh(
    new THREE.SphereGeometry(Math.max(rPx/PPM,.04),segments,segments/2),
    material3D(color,.75)
  );
  mesh.position.set(lx/PPM,y,lz/PPM);
  mesh.scale.y=scaleY;
  mesh.castShadow=true;mesh.receiveShadow=true;
  group.add(mesh);
  return mesh;
}
function addTableTop3D(group,lx,lz,w,d,color,topY=.72,thick=.08){
  return addPart3D(group,lx,lz,w,d,thick,topY,color);
}
function addLeg3D(group,lx,lz,h=.66,color=0x6b7280){
  return addPart3D(group,lx,lz,5,5,h,h/2,color);
}
function addLegs3D(group,w,d,h=.66,color=0x6b7280){
  const ix=Math.max(8,Math.min(w*.18,16)), iz=Math.max(8,Math.min(d*.18,16));
  for(const [lx,lz] of [[-w/2+ix,-d/2+iz],[w/2-ix,-d/2+iz],[-w/2+ix,d/2-iz],[w/2-ix,d/2-iz]]) addLeg3D(group,lx,lz,h,color);
}
function addStorage3D(group,w,d,h,color,cuts,axis){
  addPart3D(group,0,0,w,d,h,h/2,color);
  const lineColor=adjustHexColor(color,-45);
  for(let i=1;i<cuts;i++){
    if(axis==='x')addPart3D(group,-w/2+i*(w/cuts),0,2,d+.5,.025,h*.52,lineColor);
    else addPart3D(group,0,-d/2+i*(d/cuts),w+.5,2,.025,h*.52,lineColor);
  }
}
function addStairs3D(group,w,d,color,h3d){
  h3d=h3d||0.6;
  const steps=Math.max(3,Math.round(d/18));
  for(let i=0;i<steps;i++){
    const sd=d/steps, sh=h3d*(i+1)/steps;
    addPart3D(group,0,-d/2+sd*(i+.5),w,sd,sh,sh/2,color);
  }
}
function addTV3D(group,w,d,h3d){
  addPart3D(group,0,-d*.12,w,4,h3d,h3d*1.5,0x111827);
  addPart3D(group,0,-d*.12,w-8,3,h3d-.14,h3d*1.5+.01,0x020617);
  addPart3D(group,0,d*.22,9,8,h3d*.8,h3d*.5,0x64748b);
  addPart3D(group,0,d*.42,w*.78,7,.06,.04,0x475569);
}
function addWhiteboard3D(group,w,d,h3d){
  const boardH=h3d*.58;
  const boardY=h3d*.82;
  const topY=boardY+boardH/2;
  const bottomY=boardY-boardH/2;
  const legH=Math.max(.35,bottomY-.06);
  addPart3D(group,0,0,w,3,boardH,boardY,0xffffff);
  addPart3D(group,0,0,w+6,3,.06,topY+.03,0x9ca3af);
  addPart3D(group,0,0,w+6,3,.06,bottomY-.03,0x9ca3af);
  addPart3D(group,-w/2,0,4,3,boardH+.12,boardY,0x9ca3af);
  addPart3D(group,w/2,0,4,3,boardH+.12,boardY,0x9ca3af);
  addPart3D(group,0,d*.18,w*.78,5,.04,bottomY-.08,0x64748b);
  addPart3D(group,-w/2+8,0,4,4,legH,legH/2,0x64748b);
  addPart3D(group,w/2-8,0,4,4,legH,legH/2,0x64748b);
  addCylinder3D(group,-w/2+8,d*.22,5,.08,.04,0x475569,16);
  addCylinder3D(group,w/2-8,d*.22,5,.08,.04,0x475569,16);
}
function addPlant3D(group,w,d){
  const r=Math.min(w,d);
  addCylinder3D(group,0,d*.18,r*.28,.32,.16,0xa16207,20);
  addCylinder3D(group,0,0,r*.08,.55,.5,0x7c4a20,10);
  addSphere3D(group,0,-d*.15,r*.42,.88,0x16a34a,.75,24);
  addSphere3D(group,-w*.22,-d*.05,r*.28,.72,0x22c55e,.7,18);
  addSphere3D(group,w*.22,-d*.02,r*.28,.76,0x15803d,.7,18);
}
function addDoor3D(group,w,d){
  const hw=w/2, hd=d/2, metal=0x9ca3af;
  // 스테인리스 프레임+반투명 유리문. 2D 심볼의 하단 선이 실제 문짝 위치다.
  addGlassPart3D(group,0,hd-2,w-10,3,1.92,.98,0xbdefff,.42);
  addPart3D(group,0,hd-2,w,4,.08,1.98,metal);
  addPart3D(group,0,hd-2,w,4,.08,.08,metal);
  addPart3D(group,-hw+3,hd-2,6,4,2.02,1.01,metal);
  addPart3D(group,hw-3,hd-2,6,4,2.02,1.01,metal);
  addPart3D(group,hw-12,hd-4,3,3,.32,1.04,0x64748b);
  addDoorSwingArc3D(group,w,d,0x94a3b8);
}
function addDoubleDoor3D(group,w,d){
  const hw=w/2, hd=d/2, metal=0x9ca3af;
  addGlassPart3D(group,-w*.25,hd-2,w*.5-7,3,1.92,.98,0xbdefff,.42);
  addGlassPart3D(group,w*.25,hd-2,w*.5-7,3,1.92,.98,0xbdefff,.42);
  addPart3D(group,0,hd-2,w,4,.08,1.98,metal);
  addPart3D(group,0,hd-2,w,4,.08,.08,metal);
  addPart3D(group,-hw+3,hd-2,6,4,2.02,1.01,metal);
  addPart3D(group,hw-3,hd-2,6,4,2.02,1.01,metal);
  addPart3D(group,0,hd-2,4,4,2.0,1.0,metal);
  addPart3D(group,-5,hd-4,2,3,.34,1.04,0x64748b);
  addPart3D(group,5,hd-4,2,3,.34,1.04,0x64748b);
  addDoorSwingArc3D(group,w/2,d,0x94a3b8,0,false);
  addDoorSwingArc3D(group,w/2,d,0x94a3b8,0,true);
}
function addDoorSwingArc3D(group,w,d,color=0x9a5a2f,hingeX=null,mirror=false){
  const hw=w/2, hd=d/2, r=w/PPM;
  const hx=(hingeX==null?-hw:hingeX)/PPM;
  const verts=[];
  for(let i=0;i<=28;i++){
    const t=i/28;
    const a=mirror?-Math.PI/2-(t*Math.PI/2):-Math.PI/2+(t*Math.PI/2);
    verts.push(hx+Math.cos(a)*r,.035,(hd/PPM)+Math.sin(a)*r);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  group.add(new THREE.Line(geo,new THREE.LineBasicMaterial({color,transparent:true,opacity:.9})));
}
function addWindow3D(group,w,d){
  const frame=0xffffff, glass=0x9be7ff;
  // 창문은 벽 구멍을 뚫지는 않고, 얇은 유리판을 서 있는 패널로 세워서 문과 구분한다.
  addGlassPart3D(group,0,0,w-5,Math.max(4,d*.35),.75,1.25,glass,.45);
  addPart3D(group,0,0,w+4,3,.08,1.65,frame);
  addPart3D(group,0,0,w+4,3,.08,.86,frame);
  addPart3D(group,-w/2,0,3,3,.78,1.25,frame);
  addPart3D(group,w/2,0,3,3,.78,1.25,frame);
  addPart3D(group,0,0,3,3,.78,1.25,frame);
}
function addWindowSill3D(group,w,d,settings){
  const sillH=Math.max(.1,settings?.sillH||.82);
  const capH=.08;
  const bodyH=Math.max(.04,sillH-capH);
  // 창대석 상단은 기본 0.82m로 창문 하단 프레임 바로 밑에 맞추고, 3D 설정에서 높이를 바꿀 수 있다.
  addPart3D(group,0,0,w,d,bodyH,bodyH/2,0xe2e8f0);
  addPart3D(group,0,0,w,d,capH,bodyH+capH/2,0xf8fafc);
  addPart3D(group,0,d/2-2,w,4,sillH,sillH/2,0xd1d5db);
  addPart3D(group,-w/2+2,0,4,d,sillH,sillH/2,0xdbe3eb);
  addPart3D(group,w/2-2,0,4,d,sillH,sillH/2,0xdbe3eb);
  addMarbleVeins3D(group,w,d,sillH);
}
function addMarbleVeins3D(group,w,d,sillH=.82){
  const y=sillH+.004;
  const verts=[
    -w*.36,y,-d*.22, -w*.20,y,d*.10,
    -w*.20,y,d*.10, -w*.26,y,d*.34,
    w*.10,y,-d*.30, w*.28,y,-d*.02,
    w*.28,y,-d*.02, w*.20,y,d*.28
  ];
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  group.add(new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:0x94a3b8,transparent:true,opacity:.42})));
}
function adjustHexColor(color,delta){
  const n=typeof color==='number'?color:0xcccccc;
  const r=Math.max(0,Math.min(255,((n>>16)&255)+delta));
  const g=Math.max(0,Math.min(255,((n>>8)&255)+delta));
  const b=Math.max(0,Math.min(255,(n&255)+delta));
  return (r<<16)|(g<<8)|b;
}
function threeObjectColor(o,settings){
  if(o.sub==='door')return 0x9a5a2f;
  if(o.sub==='window')return 0x9be7ff;
  if(o.sub==='windowsill')return 0xe5e7eb;
  if(o.sub==='partition')return 0xaab2bd;
  if(o.sub==='plant')return 0x22c55e;
  return parseCssColor(o.col)||0xd9d5c6;
}
function parseCssColor(col){
  if(!col||col.startsWith('rgba'))return null;
  const canvas=parseCssColor._canvas||(parseCssColor._canvas=document.createElement('canvas'));
  const c=canvas.getContext('2d');
  c.fillStyle='#000';c.fillStyle=col;
  const v=c.fillStyle;
  if(!/^#[0-9a-f]{6}$/i.test(v))return null;
  return parseInt(v.slice(1),16);
}
function sceneMaxDim(){return Math.max(S.offW,S.offH,6);}
function organizeToolbar(){
  const toolbar=$('toolbar');
  if(!toolbar||toolbar.dataset.grouped==='1')return;
  toolbar.dataset.grouped='1';

  const title=toolbar.querySelector('.tbar-title');
  const buttons=[...toolbar.querySelectorAll('.tbtn')];
  const byId=id=>buttons.find(btn=>btn.id===id);
  const byOnclick=text=>buttons.find(btn=>(btn.getAttribute('onclick')||'').includes(text));

  const brand=document.createElement('div');
  brand.className='toolbar-brand';
  if(title)brand.appendChild(title);

  const groupsWrap=document.createElement('div');
  groupsWrap.className='toolbar-groups';
  const makeGroup=cls=>{
    const el=document.createElement('div');
    el.className=cls;
    groupsWrap.appendChild(el);
    return el;
  };

  const primary=makeGroup('toolbar-group primary');
  const edit=makeGroup('toolbar-group');
  const arrange=makeGroup('toolbar-group');
  const file=makeGroup('toolbar-group');
  const utility=makeGroup('toolbar-group utility');

  [
    byId('btn-select'),
    byId('btn-wall'),
    byId('btn-measure'),
    byId('btn-dim'),
    byId('btn-simple-view'),
    byId('btn-simple-numbers')
  ].filter(Boolean).forEach(btn=>primary.appendChild(btn));

  [
    byOnclick('deleteSelected'),
    byOnclick('rotateSelected'),
    byOnclick('flipSelected'),
    byOnclick('copySelected'),
    byOnclick('pasteClipboard'),
    byId('btn-undo'),
    byId('btn-redo')
  ].filter(Boolean).forEach(btn=>edit.appendChild(btn));

  [
    byOnclick('groupSelected'),
    byOnclick('ungroupSelected'),
    byOnclick('saveAsCustomObj'),
    byOnclick('manageCustomObjs'),
    byOnclick("alignSelected('left')"),
    byOnclick("alignSelected('center-h')"),
    byOnclick("alignSelected('right')"),
    byOnclick("alignSelected('top')"),
    byOnclick("alignSelected('center-v')"),
    byOnclick("alignSelected('bottom')"),
    byOnclick("distributeSelected('h')"),
    byOnclick("distributeSelected('v')")
  ].filter(Boolean).forEach(btn=>arrange.appendChild(btn));

  [
    byOnclick('saveLayout'),
    byOnclick('loadLayout'),
    byOnclick('exportPNG'),
    byOnclick('window.print'),
    byOnclick('showShortcuts')
  ].filter(Boolean).forEach(btn=>file.appendChild(btn));

  [
    byOnclick('doZoom(0.15)'),
    byOnclick('doZoom(-0.15)'),
    byOnclick('resetView'),
    byId('btn-3d-view')
  ].filter(Boolean).forEach(btn=>utility.appendChild(btn));

  const leftovers=buttons.filter(btn=>btn.parentElement===toolbar);

  toolbar.replaceChildren(brand,groupsWrap);
  leftovers.forEach(btn=>file.appendChild(btn));
}
function reset3DCamera(){
  if(!V3.camera)return;
  const d=sceneMaxDim();
  V3.camera.position.set(d*.65,d*.58,d*.65);
  set3DTarget(0,0,0);
}
function set3DTopView(){
  if(!V3.camera)return;
  const d=sceneMaxDim();
  V3.camera.position.set(0,d*1.15,.001);
  set3DTarget(0,0,0);
}
function set3DFrontView(){
  if(!V3.camera)return;
  const d=sceneMaxDim();
  V3.camera.position.set(0,d*.38,d*1.2);
  set3DTarget(0,0,0);
}
function set3DTarget(x,y,z){
  if(V3.controls){V3.controls.target.set(x,y,z);V3.controls.update();}
  else if(V3.fallbackControls){V3.fallbackControls.target.set(x,y,z);V3.fallbackControls.update();}
  else V3.camera.lookAt(x,y,z);
}
function resize3DView(){
  if(!V3.renderer||!V3.camera||!V3.root)return;
  const w=V3.root.clientWidth||cont.clientWidth,h=V3.root.clientHeight||cont.clientHeight;
  V3.renderer.setSize(w,h,false);
  V3.camera.aspect=w/Math.max(1,h);
  V3.camera.updateProjectionMatrix();
}
function start3DLoop(){
  stop3DLoop();
  const loop=()=>{
    if(!V3.active||!V3.renderer||!V3.scene||!V3.camera)return;
    V3.controls?.update?.();
    V3.fallbackControls?.update?.();
    V3.renderer.render(V3.scene,V3.camera);
    V3.anim=requestAnimationFrame(loop);
  };
  loop();
}
function stop3DLoop(){
  if(V3.anim)cancelAnimationFrame(V3.anim);
  V3.anim=null;
}
function makeFallback3DControls(dom){
  const state={camera:null,target:new THREE.Vector3(),drag:false,button:0,lastX:0,lastY:0,dist:12,theta:Math.PI/4,phi:Math.PI/3};
  dom.addEventListener('mousedown',e=>{state.drag=true;state.button=e.button;state.lastX=e.clientX;state.lastY=e.clientY;});
  window.addEventListener('mouseup',()=>state.drag=false);
  window.addEventListener('mousemove',e=>{
    if(!state.drag||!state.camera)return;
    const dx=e.clientX-state.lastX,dy=e.clientY-state.lastY;state.lastX=e.clientX;state.lastY=e.clientY;
    if(state.button===2){const pan=.015*state.dist;state.target.x-=dx*pan;state.target.z-=dy*pan;}
    else{state.theta-=dx*.008;state.phi=Math.max(.15,Math.min(Math.PI/2.05,state.phi+dy*.008));}
    fallbackApply(state);
  });
  dom.addEventListener('wheel',e=>{if(!state.camera)return;e.preventDefault();state.dist=Math.max(2,Math.min(120,state.dist*(e.deltaY>0?1.08:.92)));fallbackApply(state);},{passive:false});
  return {target:state.target,attach(cam){state.camera=cam;state.dist=sceneMaxDim();fallbackApply(state);},update(){},dispose(){},state};
}
function fallbackApply(state){
  const c=state.camera;if(!c)return;
  c.position.set(
    state.target.x+Math.sin(state.theta)*Math.sin(state.phi)*state.dist,
    state.target.y+Math.cos(state.phi)*state.dist,
    state.target.z+Math.cos(state.theta)*Math.sin(state.phi)*state.dist
  );
  c.lookAt(state.target);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadCustomObjs();
organizeToolbar();

syncSimpleViewButton();

  $('zoom-badge').textContent=Math.round(S.zoom*100)+'%';
  refreshLayerList();render();
}else{
  resetView();
}
